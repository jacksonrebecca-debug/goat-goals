<title>GOAT English · Level Up Your Words</title>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ============================================================================
   GOAT GOALS · GOAT English — one challenge a day, 9 weeks (63 days)
   Pitched for a bright 9-year-old (UK Year 4–5). Read, think, then reveal.
   Covers: parts of speech · expanded noun & prepositional phrases ·
           synonyms / antonyms / up-levelling · word play.
   Edit a question by changing the QUESTIONS array below.
     type: Parts of Speech | Word Upgrades | Phrase Power | Word Play
   ========================================================================== */

const QUESTIONS = [
  // ---- Week 1: warming up the machinery ----
  { day: 1, type: "Grammar Detective", diff: 2, q: "In \"Although the rain fell, the match continued,\" which single word is the CONJUNCTION joining the two ideas?", hint: "It's the very first word — it makes one part of the sentence depend on the other.", answer: "although", why: "\"Although\" is a subordinating conjunction — it glues a subordinate clause onto the main clause." },
  { day: 2, type: "Word Upgrades", diff: 2, q: "Give a SYNONYM for \"reluctant\" (not keen to do something).", hint: "Think: un-______ or he-______.", answer: "unwilling/hesitant/loath/unenthusiastic/disinclined", why: "Reluctant = unwilling or hesitant. Precise synonyms let you tune exactly HOW unkeen someone is." },
  { day: 3, type: "Figurative Language", diff: 2, q: "\"The wind whispered through the trees.\" Giving the wind a human action is a technique called…?", hint: "It makes the wind act like a PERSON.", answer: "personification", why: "Personification gives human qualities to non-human things — the wind can't literally whisper." },
  { day: 4, type: "Word Roots", diff: 2, q: "The Latin root \"aqua\" (aquarium, aqueduct, aquatic) means…?", hint: "What lives in an aquarium — and what do they swim in?", answer: "water", why: "aqua = water. Once you know a root, you can unlock whole families of words." },
  { day: 5, type: "Grammar Detective", diff: 3, q: "In \"The remarkably tall boy spoke softly,\" which word is an ADVERB describing an ADJECTIVE?", hint: "Not \"softly\" — that one describes the verb. Which word tells you HOW tall?", answer: "remarkably", why: "Adverbs don't only describe verbs — \"remarkably\" is telling us the degree of the adjective \"tall\"." },
  { day: 6, type: "Tricky Spellings", diff: 2, q: "One of these is correct: \"seperate\" or \"separate\". Type the correct spelling.", hint: "There's 'a rat' hiding in the middle of the correct one: sep-A-RAT-e.", answer: "separate", why: "SepARATe — remember the rat in the middle. One of the most misspelled words in English." },
  { day: 7, type: "Word Play", diff: 2, q: "What do you call a word that reads the same forwards and backwards, like \"level\" or \"kayak\"?", hint: "It starts with \"palin-\", from Greek for \"again\".", answer: "palindrome", why: "A palindrome reads identically both ways. Even whole sentences can do it: \"Never odd or even\"." },

  // ---- Week 2 ----
  { day: 8, type: "Grammar Detective", diff: 3, q: "In \"The dog that stole the sausage escaped,\" which word is the RELATIVE PRONOUN?", hint: "It introduces the clause telling you WHICH dog.", answer: "that", why: "\"That\" is a relative pronoun (like who, whose, which) — it pins extra information onto \"the dog\"." },
  { day: 9, type: "Word Upgrades", diff: 2, q: "Give an ANTONYM (opposite) of \"generous\".", hint: "Someone who won't share a single sweet is…", answer: "mean/stingy/selfish/miserly/tight-fisted/ungenerous", why: "Mean, stingy, miserly, selfish — English has a whole rogues' gallery of opposites for generous." },
  { day: 10, type: "Punctuation", diff: 3, q: "The books belong to SEVERAL boys. In \"the boys books\", does the apostrophe go BEFORE or AFTER the s?", hint: "More than one boy… the plural came first, then the apostrophe.", answer: "after", why: "The boys' books — plural first (boys), then the apostrophe. One boy would be the boy's books." },
  { day: 11, type: "Etymology", diff: 2, q: "Which language gave English the words \"ballet\", \"café\" and \"menu\"?", hint: "Just across the Channel…", answer: "french", why: "French — after 1066, French poured into English, especially words for food, fashion and art." },
  { day: 12, type: "Figurative Language", diff: 2, q: "\"I've told you a MILLION times!\" Deliberate exaggeration for effect is called…?", hint: "Starts with \"hyper-\", like hyperactive.", answer: "hyperbole", why: "Hyperbole (say it hy-PER-bo-lee) is exaggeration on purpose — nobody has really told you a million times." },
  { day: 13, type: "Word Roots", diff: 2, q: "The Greek root \"tele\" (telephone, telescope, television) means…?", hint: "A telescope lets you see things that are…", answer: "far/far away/distant/at a distance", why: "tele = far. Telephone = far sound; telescope = far seeing; television = far sight." },
  { day: 14, type: "Word Play", diff: 3, q: "Rearrange ALL the letters of \"LISTEN\" to make another six-letter word.", hint: "Ssshhh… what is a room when everyone listens?", answer: "silent/enlist/tinsel/inlets", why: "LISTEN → SILENT (also enlist, tinsel, inlets). A rearrangement like this is called an anagram." },

  // ---- Week 3 ----
  { day: 15, type: "Grammar Detective", diff: 3, q: "\"The cake was eaten by the dog.\" Is this sentence ACTIVE or PASSIVE voice?", hint: "Is the subject (the cake) DOING the action, or having it done TO it?", answer: "passive", why: "Passive — the cake isn't doing anything; it's being acted upon. Active would be: \"The dog ate the cake.\"" },
  { day: 16, type: "Word Upgrades", diff: 2, q: "A powerful word for \"very tired\", beginning with \"ex-\"…", hint: "After a marathon you'd be utterly ex______.", answer: "exhausted", why: "Exhausted — from Latin for \"drained out\". Much stronger than plain \"tired\"." },
  { day: 17, type: "Tricky Spellings", diff: 3, q: "UK spelling test: \"I need to ___ the piano every day.\" Is it practice or practise?", hint: "In British English: noun with C, verb with S (like advice/advise).", answer: "practise", why: "Practise with an S is the VERB in British English; practice with a C is the noun (\"piano practice\")." },
  { day: 18, type: "Figurative Language", diff: 2, q: "\"The classroom was a zoo.\" Is that a metaphor or a simile?", hint: "Is there a \"like\" or an \"as\" doing the comparing?", answer: "metaphor", why: "No \"like\" or \"as\" — it says the classroom WAS a zoo, so it's a metaphor. \"Like a zoo\" would be a simile." },
  { day: 19, type: "Grammar Detective", diff: 2, q: "In \"You must finish your homework,\" which word is the MODAL verb?", hint: "Modal verbs show necessity or possibility: can, could, may, might, shall, should, will, would…", answer: "must", why: "\"Must\" is a modal verb — it changes the main verb's force, from a plain fact to an obligation." },
  { day: 20, type: "Word Roots", diff: 3, q: "The Latin root \"bene\" (benefit, benevolent) means…?", hint: "A benefit is something ___ for you.", answer: "good/well", why: "bene = good/well. Benevolent = wishing good; beneficial = doing good. (Its evil twin is \"mal\"…)" },
  { day: 21, type: "Word Play", diff: 2, q: "Collective nouns: it's famously \"a ___ of crows\".", hint: "Rather dark — it sounds like a crime!", answer: "murder", why: "A murder of crows! English collective nouns are gloriously odd — wait until you meet the owls…" },

  // ---- Week 4 ----
  { day: 22, type: "Grammar Detective", diff: 3, q: "\"Running down the hill, Sam laughed.\" Who or what is the SUBJECT of this sentence?", hint: "Who is actually doing the laughing (and the running)?", answer: "sam", why: "Sam is the subject. The opening \"-ing\" phrase must belong to the subject — otherwise you get nonsense like \"Running down the hill, the tree looked lovely\"." },
  { day: 23, type: "Word Upgrades", diff: 2, q: "A synonym for \"brave\" beginning with \"c\"…", hint: "A lion-hearted knight is c________.", answer: "courageous", why: "Courageous — from French \"coeur\", meaning heart. Brave literally comes from the heart!" },
  { day: 24, type: "Etymology", diff: 3, q: "\"Sandwich\", \"wellington\" and \"cardigan\" all entered English the same unusual way. They're all named after…?", hint: "An Earl, a Duke and another Earl…", answer: "people/real people/peoples names/names of people/famous people", why: "All named after real people: the Earl of Sandwich, the Duke of Wellington, the Earl of Cardigan. Words from names are called eponyms." },
  { day: 25, type: "Figurative Language", diff: 3, q: "\"A deafening silence\" — two contradictory words jammed together is called an…?", hint: "Starts with \"oxy-\". (Not the moron kind… well, partly!)", answer: "oxymoron", why: "An oxymoron pairs opposites for effect: deafening silence, bittersweet, seriously funny, act naturally." },
  { day: 26, type: "Tricky Spellings", diff: 2, q: "Passed or past: \"She walked ___ the shop without stopping.\"", hint: "Is it the verb \"to pass\", or a position word?", answer: "past", why: "\"Past\" here is a preposition telling you where she walked. \"Passed\" is only ever the verb: \"she passed the test\"." },
  { day: 27, type: "Word Roots", diff: 2, q: "The Latin root \"port\" (transport, export, portable) means…?", hint: "What does a porter do with your bags?", answer: "carry/to carry", why: "port = carry. Transport = carry across; export = carry out; portable = carriable." },
  { day: 28, type: "Word Play", diff: 3, q: "\"Brunch\" squashes together \"breakfast\" and \"lunch\". What is a squashed-together word like this called?", hint: "It's named after a folding suitcase — \"port______ word\" (or you can call it a blend).", answer: "portmanteau/portmanteau word/blend/blend word", why: "A portmanteau (or blend): brunch, smog (smoke+fog), podcast (iPod+broadcast). Lewis Carroll coined the term." },

  // ---- Week 5 ----
  { day: 29, type: "Grammar Detective", diff: 3, q: "Type the SUBORDINATE clause in: \"Although she was tired, Maya kept running.\"", hint: "It's the part that can't stand alone as a sentence.", answer: "although she was tired", why: "\"Although she was tired\" can't stand alone — it leans on the main clause \"Maya kept running\". That's what makes it subordinate." },
  { day: 30, type: "Word Upgrades", diff: 3, q: "Replace boring \"said\" with a precise verb meaning \"said very quietly\".", hint: "Wh______, mu______ or mur______…", answer: "whispered/murmured/muttered/whisper/murmur/mutter", why: "Whispered, murmured, muttered — each slightly different. Precise verbs beat \"said quietly\" every time." },
  { day: 31, type: "Figurative Language", diff: 2, q: "Boom! Crash! Hiss! Sizzle! Words that SOUND like what they mean use a technique called…?", hint: "The longest technique name of them all: o_________.", answer: "onomatopoeia", why: "Onomatopoeia — from Greek for \"name-making\". The word imitates the sound itself." },
  { day: 32, type: "Etymology", diff: 3, q: "\"Pyjamas\", \"shampoo\" and \"bungalow\" all came into English from languages of which country?", hint: "Think of the British Empire's largest colony…", answer: "india", why: "All from India (via Hindi and Urdu) — English hoovered up hundreds of words during the colonial era." },
  { day: 33, type: "Grammar Detective", diff: 2, q: "\"Quickly, quietly and carefully\" — what part of speech are all three words?", hint: "They all end in -ly and describe HOW something is done.", answer: "adverbs/adverb", why: "All adverbs — they modify verbs, telling you how the action happens." },
  { day: 34, type: "Tricky Spellings", diff: 3, q: "Stationary or stationery: which spelling means pens, paper and envelopes?", hint: "E for Envelopes!", answer: "stationery", why: "StationEry = pens and paper (E for envelopes). StationAry = not moving (A for at a standstill)." },
  { day: 35, type: "Word Play", diff: 2, q: "A \"parliament\" is the splendid collective noun for which birds?", hint: "The wise ones, out at night.", answer: "owls", why: "A parliament of owls — presumably because they look so wise and serious in a group." },

  // ---- Week 6 ----
  { day: 36, type: "Grammar Detective", diff: 3, q: "Turn this passive sentence active in your head: \"The window was broken by Tom.\" What is the FIRST word of the active version?", hint: "In the active voice, the doer goes first.", answer: "tom", why: "Active: \"Tom broke the window.\" The doer (Tom) becomes the subject — shorter, punchier, clearer." },
  { day: 37, type: "Word Upgrades", diff: 2, q: "Give an antonym of \"ancient\".", hint: "The opposite of an ancient ruin is a ___ building.", answer: "modern/new/recent/contemporary/current", why: "Modern, new, recent, contemporary — each opposite has its own flavour of \"not old\"." },
  { day: 38, type: "Word Roots", diff: 3, q: "The Latin root \"aud\" (audible, audience, audio) means…?", hint: "What is an audience doing?", answer: "hear/to hear/hearing/listen/listening", why: "aud = hear. Audible = hearable; audience = the hearers; audition = a hearing." },
  { day: 39, type: "Figurative Language", diff: 2, q: "\"As slippery as an eel\" — simile, metaphor or personification?", hint: "Spot the little word doing the comparing.", answer: "simile", why: "The \"as\" gives it away — similes compare using \"like\" or \"as\"." },
  { day: 40, type: "Etymology", diff: 3, q: "The word \"alphabet\" is built from the first two letters of which ancient language's alphabet?", hint: "Alpha, beta…", answer: "greek", why: "Alpha + beta = alphabet, straight from ancient Greek. The word contains its own beginning!" },
  { day: 41, type: "Tricky Spellings", diff: 3, q: "Affect or effect: \"The rain didn't ___ our plans.\"", hint: "RAVEN: Remember, Affect is a Verb, Effect is a Noun (usually!).", answer: "affect", why: "Here you need the VERB, so it's affect. Effect is (usually) the noun: \"the rain had no effect\"." },
  { day: 42, type: "Word Play", diff: 3, q: "Anagram time: rearrange all five letters of \"EARTH\" into another word.", hint: "It beats inside your chest.", answer: "heart/hater", why: "EARTH → HEART. Some say it's fitting that earth and heart share their letters." },

  // ---- Week 7 ----
  { day: 43, type: "Grammar Detective", diff: 3, q: "\"The girl whose bike was stolen cried.\" Which word is the relative pronoun?", hint: "It shows the bike BELONGED to the girl.", answer: "whose", why: "\"Whose\" is the possessive relative pronoun — it links the girl to her bike inside the relative clause." },
  { day: 44, type: "Word Upgrades", diff: 2, q: "A word meaning \"very talkative\", beginning with \"ch\"…", hint: "A ch____ person never stops nattering.", answer: "chatty/chattering/chatterbox", why: "Chatty! (For bonus sophistication: garrulous or loquacious mean the same — sprinkle those in an essay.)" },
  { day: 45, type: "Figurative Language", diff: 3, q: "\"Time is a thief.\" Which technique is this?", hint: "Time isn't LIKE a thief — it IS one, apparently.", answer: "metaphor", why: "A metaphor — it states time IS a thief. It also personifies time, but the direct \"X is Y\" claim makes it a classic metaphor." },
  { day: 46, type: "Word Roots", diff: 2, q: "The Latin root \"spect\" (inspect, spectator, spectacles) means…?", hint: "What do spectators DO at a match?", answer: "look/watch/see/to look/to watch/to see", why: "spect = look/watch. Inspect = look into; spectator = watcher; spectacles = things you look through." },
  { day: 47, type: "Etymology", diff: 3, q: "\"Robot\" entered English from a Czech play in 1920 — from a Czech word meaning…?", hint: "What are robots built to do all day?", answer: "work/forced work/forced labour/labour/hard work/drudgery/slave work", why: "From Czech \"robota\" — forced labour/drudgery — coined in Karel Čapek's play R.U.R. The word is barely 100 years old!" },
  { day: 48, type: "Tricky Spellings", diff: 2, q: "Whose or who's: \"___ coat is this?\"", hint: "Could you swap in \"who is\"? If not, no apostrophe.", answer: "whose", why: "\"Who is coat is this?\" makes no sense — so it's whose (possession). Who's ALWAYS means \"who is/has\"." },
  { day: 49, type: "Word Play", diff: 3, q: "\"The quick brown fox jumps over the lazy dog\" contains every letter of the alphabet. What is such a sentence called?", hint: "Pan- means \"all\" in Greek…", answer: "pangram/a pangram", why: "A pangram — \"all letters\". Typists and font designers have used the quick brown fox for over a century." },

  // ---- Week 8 ----
  { day: 50, type: "Grammar Detective", diff: 3, q: "Tricky agreement: \"Neither the boys nor their teacher ___ happy.\" Was or were?", hint: "With neither/nor, the verb agrees with the NEAREST subject.", answer: "was", why: "\"Was\" — with neither/nor, the verb matches the nearer subject (\"teacher\", singular). Swap the order and it becomes \"were\"!" },
  { day: 51, type: "Word Upgrades", diff: 3, q: "A word meaning \"wildly happy — happier than happy\", beginning with \"e\"…", hint: "Winning the World Cup would leave you ec_____ (or el____).", answer: "ecstatic/elated/euphoric/exhilarated", why: "Ecstatic, elated, euphoric — the top shelf of happiness words. \"Happy\" barely covers a World Cup win." },
  { day: 52, type: "Figurative Language", diff: 3, q: "\"The stars danced in the sky.\" Which technique?", hint: "Can stars really dance? Who CAN dance?", answer: "personification", why: "Personification — dancing is a human action given to the stars." },
  { day: 53, type: "Word Roots", diff: 3, q: "The root \"mal\" (malfunction, malicious) means…?", hint: "It's the evil twin of \"bene\" from Day 20.", answer: "bad/badly/wrong/evil/ill", why: "mal = bad. Malfunction = work badly; malicious = meaning harm. Bene and mal are opposite twins." },
  { day: 54, type: "Etymology", diff: 3, q: "\"Ketchup\" probably began life as a fish sauce word from which continent?", hint: "Long before tomatoes were involved — think Hokkien traders.", answer: "asia/china/southeast asia/east asia", why: "Most likely from Hokkien Chinese \"kê-tsiap\", a fish sauce — it travelled via Southeast Asia to Britain, and tomatoes only joined in later!" },
  { day: 55, type: "Tricky Spellings", diff: 2, q: "One of these is right: \"definately\", \"definitely\", \"definitly\". Type the correct one.", hint: "There's \"finite\" hiding in the middle: de-FINITE-ly.", answer: "definitely", why: "DeFINITEly — find the \"finite\" and you'll never misspell it again." },
  { day: 56, type: "Word Play", diff: 3, q: "In the word \"knife\", which letter is silent?", hint: "Say it out loud — which letter are you skipping?", answer: "k/the k", why: "The silent K — a fossil! Centuries ago English speakers really did pronounce it: \"k-nife\". Spelling froze; speech moved on." },

  // ---- Week 9: the summit ----
  { day: 57, type: "Grammar Detective", diff: 3, q: "\"She said that she was tired.\" Is this DIRECT speech or REPORTED speech?", hint: "Are her exact words in quotation marks?", answer: "reported/indirect/reported speech/indirect speech", why: "Reported (indirect) speech — no quotation marks, no exact words. Direct would be: She said, \"I am tired.\"" },
  { day: 58, type: "Word Upgrades", diff: 3, q: "A precise verb meaning \"to walk slowly and heavily, worn out\": \"tr____\"", hint: "Through deep snow at the end of a long day, you don't walk — you tr____.", answer: "trudge/trudged/trudging", why: "Trudge — one word carrying the weight of tired legs. Also fine: plod, traipse. Verbs can paint pictures." },
  { day: 59, type: "Figurative Language", diff: 2, q: "Finish the idiom meaning \"to reveal a secret\": \"to let the cat out of the ___\".", hint: "Where might a sneaky market trader have hidden a cat instead of a pig?", answer: "bag", why: "Let the cat out of the bag — possibly from dodgy traders selling a bagged \"pig\" that turned out to be a cat!" },
  { day: 60, type: "Word Roots", diff: 2, q: "The root \"sub\" (submarine, subheading, subzero) means…?", hint: "Where does a submarine travel, relative to the surface?", answer: "under/below/beneath", why: "sub = under. Submarine = under the sea; subzero = below zero; subheading = under the heading." },
  { day: 61, type: "Etymology", diff: 3, q: "Most English word roots come from TWO ancient languages. Name either one.", hint: "One built an empire from Rome; the other gave us alpha and beta.", answer: "latin/greek/latin and greek/greek and latin", why: "Latin and Greek. Between them they supply the roots of most long English words — which is why learning roots is a superpower (and why Latin lessons secretly boost English!)." },
  { day: 62, type: "Tricky Spellings", diff: 2, q: "Its or it's: \"The dog wagged ___ tail.\"", hint: "Could you say \"it is tail\"? If not…", answer: "its", why: "Its — belonging, no apostrophe. It's ONLY ever means \"it is\" or \"it has\". This one trips up adults daily." },
  { day: 63, type: "Word Play", diff: 3, q: "Summit question! A brand-new invented word (as \"selfie\" and \"podcast\" once were) is called a \"neo______\".", hint: "neo = new, logos = word… put them together.", answer: "neologism", why: "A neologism — literally \"new word\", built from Greek roots you now know. Language never stops growing; one day you might coin one. Summit conquered! 🏔️" },
];

const TYPE_META = {
  "Parts of Speech": { color: "#2f7ef0", soft: "#dbeafe", glyph: "Aa" },
  "Word Upgrades":   { color: "#15a371", soft: "#d2f3e4", glyph: "⇪" },
  "Phrase Power":    { color: "#f5681e", soft: "#ffe2d1", glyph: "❝" },
  "Word Play":       { color: "#7c5cf6", soft: "#e7defe", glyph: "★" },
};

const STORAGE_KEY = "goat-goals-english:v1";   // separate from maths, so each subject tracks on its own
const TOTAL = QUESTIONS.length;

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function daysBetween(a, b) { return Math.round((new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 86400000); }
function clamp(n, lo, hi) { return Math.min(Math.max(n, lo), hi); }
function loadState() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch (e) {} return null; }

function GoatEnglish() {
  const saved = useRef(loadState()).current;
  const [startDate, setStartDate] = useState((saved && saved.startDate) || todayISO());
  const [completed, setCompleted] = useState((saved && saved.completed) || {});
  const currentDay = clamp(daysBetween(startDate, todayISO()) + 1, 1, TOTAL);
  const [selected, setSelected] = useState(() => clamp(daysBetween(((saved && saved.startDate) || todayISO()), todayISO()) + 1, 1, TOTAL));
  const [showHint, setShowHint] = useState(false);
  const [showAnswer, setShowAnswer] = useState(false);
  const [myAnswer, setMyAnswer] = useState("");
  const [feedback, setFeedback] = useState(null); // null | "correct" | "wrong"
  const [showSettings, setShowSettings] = useState(false);
  const [burst, setBurst] = useState(0);

  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ startDate, completed })); } catch (e) {} }, [startDate, completed]);
  useEffect(() => { setShowHint(false); setShowAnswer(false); setMyAnswer(""); setFeedback(null); }, [selected]);

  const q = QUESTIONS.find((x) => x.day === selected);
  const meta = TYPE_META[q.type] || TYPE_META["Word Play"];
  const solvedCount = Object.values(completed).filter((c) => c.solved).length;

  let streak = 0;
  for (let d = currentDay; d >= 1; d--) { if (completed[d] && completed[d].solved) streak++; else break; }

  function markSolved() { setCompleted((p) => ({ ...p, [selected]: { ...(p[selected] || {}), solved: true } })); setBurst((b) => b + 1); }
  function unmark() { setCompleted((p) => { const n = { ...p }; if (n[selected]) n[selected] = { ...n[selected], solved: false }; return n; }); }
  function peek() { setShowAnswer(true); setCompleted((p) => ({ ...p, [selected]: { ...(p[selected] || {}), peeked: true } })); }

  // Forgiving text match: ignore case, punctuation, leading a/an/the, and extra spaces
  function norm(s) {
    return String(s).toLowerCase().trim()
      .replace(/[.,!?;:'"()]/g, "")
      .replace(/^(a|an|the)\s+/, "")
      .replace(/\s+/g, " ");
  }
  function check() {
    if (!myAnswer.trim()) return;
    const mine = norm(myAnswer);
    // Accept any listed alternative, split on / , "or", or ";"
    const opts = String(q.answer).split(/\s*(?:\/|,|;|\bor\b)\s*/i).map(norm).filter(Boolean);
    const correct = opts.includes(mine);
    setFeedback(correct ? "correct" : "wrong");
    if (correct && !(completed[selected] && completed[selected].solved)) markSolved();
  }

  const css = `
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Nunito:wght@400;600;700;800&display=swap');
    .gge * { box-sizing:border-box; }
    .gge { font-family:'Nunito',sans-serif; color:#15233b; min-height:100vh; padding:22px 16px 50px;
      background: radial-gradient(900px 460px at 88% -6%, #fff0cf 0%, transparent 50%), radial-gradient(1000px 520px at 8% 0%, #d4ecff 0%, transparent 55%), radial-gradient(800px 520px at 50% 116%, #d9f5e6 0%, transparent 55%), #f4f9ff; position:relative; }
    .gge-wrap { max-width:720px; margin:0 auto; position:relative; }
    .gge-back { display:inline-block; text-decoration:none; color:#7a8aa3; font-weight:800; font-size:14px; margin-bottom:14px; }
    .gge-back:hover { color:#2f7ef0; }
    .gge-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:18px; }
    .gge-title { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(28px,7vw,44px); line-height:.98; letter-spacing:-1px; margin:0; }
    .gge-title .hl { color:#f5a623; }
    .gge-sub { font-weight:700; color:#7a8aa3; font-size:14px; margin-top:4px; }
    .gge-gear { background:#fff; border:2px solid #e2ebf6; width:42px; height:42px; border-radius:14px; font-size:18px; cursor:pointer; box-shadow:0 3px 0 #e2ebf6; flex:none; }
    .gge-gear:active { transform:translateY(2px); box-shadow:0 1px 0 #e2ebf6; }
    .gge-stats { display:flex; gap:10px; margin-bottom:18px; }
    .gge-stat { flex:1; background:#fff; border:2px solid #e2ebf6; border-radius:16px; padding:10px 14px; box-shadow:0 4px 0 #e2ebf6; }
    .gge-stat b { font-family:'Bricolage Grotesque',sans-serif; font-size:24px; display:block; line-height:1; }
    .gge-stat span { font-size:12px; font-weight:800; color:#9aa9bf; text-transform:uppercase; letter-spacing:.6px; }
    .gge-card { background:#fff; border:2.5px solid #15233b; border-radius:26px; padding:24px 22px; box-shadow:8px 8px 0 ${meta.color}; position:relative; overflow:hidden; }
    .gge-card .watermark { position:absolute; right:0px; bottom:-46px; font-size:150px; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; color:${meta.soft}; line-height:1; user-select:none; }
    .gge-badge { display:inline-flex; align-items:center; gap:7px; background:${meta.soft}; color:${meta.color}; font-weight:800; font-size:13px; padding:6px 12px; border-radius:999px; text-transform:uppercase; letter-spacing:.5px; }
    .gge-day { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:13px; color:#9aa9bf; letter-spacing:.5px; margin-top:14px; }
    .gge-q { font-size:clamp(19px,4.4vw,24px); font-weight:800; line-height:1.4; margin:6px 0 0; position:relative; }
    .gge-diff { margin-top:12px; font-size:12px; font-weight:800; color:#aab7cb; }
    .gge-diff .dot { color:${meta.color}; }
    .gge-actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:22px; position:relative; }
    .gge-btn { font-family:'Nunito',sans-serif; font-weight:800; font-size:15px; border:2.5px solid #15233b; background:#fff; padding:11px 18px; border-radius:14px; cursor:pointer; box-shadow:0 4px 0 #15233b; transition:transform .05s; }
    .gge-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #15233b; }
    .gge-btn.solve { background:${meta.color}; color:#fff; }
    .gge-btn.solved { background:#15a371; color:#fff; }
    .gge-btn.ghost { box-shadow:0 4px 0 #e2ebf6; border-color:#e2ebf6; color:#5b6b82; }
    .gge-reveal { margin-top:16px; background:${meta.soft}; border-radius:16px; padding:14px 16px; font-weight:600; line-height:1.5; animation:pop .25s ease; }
    .gge-reveal .lab { font-weight:800; color:${meta.color}; text-transform:uppercase; font-size:12px; letter-spacing:.6px; display:block; margin-bottom:3px; }
    .gge-reveal .ans { font-family:'Bricolage Grotesque',sans-serif; font-size:21px; font-weight:800; }
    .gge-answerbox { display:flex; gap:10px; margin-top:22px; flex-wrap:wrap; }
    .gge-input { flex:1; min-width:160px; font-family:'Nunito',sans-serif; font-weight:700; font-size:16px; padding:11px 15px; border:2.5px solid #e2ebf6; border-radius:14px; outline:none; color:#15233b; background:#fff; }
    .gge-input:focus { border-color:${meta.color}; }
    .gge-youwrote { font-weight:700; margin-bottom:6px; }
    .gge-youwrote b { color:${meta.color}; }
    .gge-fb { margin-top:16px; border-radius:16px; padding:14px 16px; font-weight:700; line-height:1.5; animation:pop .25s ease; }
    .gge-fb.correct { background:#d9f5e6; border:2.5px solid #15a371; color:#0f6b4a; }
    .gge-fb.wrong { background:#fff2d6; border:2.5px solid #e0a417; color:#8a5a00; }
    .gge-fb .big { font-family:'Bricolage Grotesque',sans-serif; font-size:19px; display:block; margin-bottom:3px; }
    @keyframes pop { from {opacity:0; transform:translateY(6px) scale(.98);} to {opacity:1; transform:none;} }
    .gge-nav { display:flex; align-items:center; justify-content:space-between; margin-top:18px; gap:10px; }
    .gge-navbtn { border:2px solid #e2ebf6; background:#fff; border-radius:12px; padding:8px 14px; font-weight:800; cursor:pointer; box-shadow:0 3px 0 #e2ebf6; }
    .gge-navbtn:disabled { opacity:.35; cursor:default; box-shadow:none; }
    .gge-today { background:#15233b; color:#fff; border:2px solid #15233b; box-shadow:0 3px 0 #000; }
    .gge-section { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:16px; margin:26px 0 10px; color:#5b6b82; }
    .gge-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:7px; }
    .gge-cell { aspect-ratio:1; border-radius:11px; border:2px solid #e2ebf6; background:#fff; font-weight:800; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#aab7cb; position:relative; }
    .gge-cell.done { background:#15a371; color:#fff; border-color:#15a371; }
    .gge-cell.peeked { background:#eef3fb; color:#9aa9bf; border-color:#dde6f2; }
    .gge-cell.today { border-color:#15233b; border-width:2.5px; color:#15233b; box-shadow:0 0 0 3px #ffe0a3; }
    .gge-cell.sel { transform:scale(1.08); box-shadow:0 0 0 2px ${meta.color}; }
    .gge-weeklab { font-size:11px; font-weight:800; color:#b6c2d6; grid-column:1 / -1; margin-top:6px; text-transform:uppercase; letter-spacing:.5px; }
    .gge-modal { position:fixed; inset:0; background:rgba(21,35,59,.5); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }
    .gge-modal-card { background:#f4f9ff; border:2.5px solid #15233b; border-radius:22px; padding:24px; max-width:380px; width:100%; box-shadow:8px 8px 0 #f5a623; }
    .gge-modal-card h3 { font-family:'Bricolage Grotesque',sans-serif; margin:0 0 6px; font-size:22px; }
    .gge-modal-card p { font-size:14px; color:#5b6b82; font-weight:600; margin:0 0 16px; line-height:1.5; }
    .gge-modal-card input { font-family:'Nunito',sans-serif; font-size:16px; font-weight:700; padding:10px 12px; border:2px solid #15233b; border-radius:12px; width:100%; margin-bottom:16px; }
    .gge-confetti { position:absolute; left:50%; top:30%; pointer-events:none; }
    .gge-confetti i { position:absolute; width:9px; height:9px; border-radius:2px; animation:fly .9s ease-out forwards; }
    @keyframes fly { to { transform:translate(var(--x), var(--y)) rotate(var(--r)); opacity:0; } }
  `;
  const confettiColors = ["#2f7ef0", "#15a371", "#f5681e", "#7c5cf6", "#f5a623"];

  return (
    <div className="gge">
      <style>{css}</style>
      <div className="gge-wrap">
        <a className="gge-back" href="index.html">← GOAT Goals</a>
        <div className="gge-head">
          <div>
            <h1 className="gge-title">GOAT <span className="hl">English</span> ✍️</h1>
            <div className="gge-sub">The hard stuff · one challenge a day · 63 days · v2</div>
          </div>
          <button className="gge-gear" onClick={() => setShowSettings(true)} title="Settings">⚙</button>
        </div>

        <div className="gge-stats">
          <div className="gge-stat"><b>{solvedCount}<span style={{ fontSize: 13, color: "#b6c2d6" }}> / {TOTAL}</span></b><span>Mastered</span></div>
          <div className="gge-stat"><b>{streak} 🔥</b><span>Day streak</span></div>
          <div className="gge-stat"><b>{currentDay}</b><span>Today is day</span></div>
        </div>

        <div className="gge-card">
          <div className="watermark">{meta.glyph}</div>
          <span className="gge-badge">{meta.glyph} {q.type}</span>
          <div className="gge-day">DAY {q.day}{q.day === currentDay ? " · today" : q.day < currentDay ? " · catch-up" : " · coming up"}</div>
          <p className="gge-q">{q.q}</p>
          <div className="gge-diff">Challenge level: <span className="dot">{"▲".repeat(q.diff)}</span><span style={{ color: "#e3eaf4" }}>{"▲".repeat(3 - q.diff)}</span></div>

          <div className="gge-answerbox">
            <input
              className="gge-input"
              type="text"
              placeholder="Think it through, then type your answer…"
              value={myAnswer}
              onChange={(e) => { setMyAnswer(e.target.value); if (feedback) setFeedback(null); }}
              onKeyDown={(e) => { if (e.key === "Enter") check(); }}
            />
            <button className="gge-btn solve" onClick={check}>✓ Check</button>
          </div>

          {feedback === "correct" && (
            <div className="gge-fb correct">
              <span className="big">✓ Spot on — great work! ✍️</span>
              {q.why && <div style={{ fontWeight: 600 }}>{q.why}</div>}
            </div>
          )}
          {feedback === "wrong" && (
            <div className="gge-fb wrong">
              <span className="big">Not quite — have another go! 🤔</span>
              <div style={{ fontWeight: 600 }}>There can be more than one good answer here — try again, or tap “Just show me” to compare with mine.</div>
            </div>
          )}

          <div className="gge-actions">
            {burst > 0 && (
              <div className="gge-confetti" key={burst}>
                {Array.from({ length: 14 }).map((_, i) => {
                  const ang = (i / 14) * Math.PI * 2;
                  return <i key={i} style={{ background: confettiColors[i % confettiColors.length], "--x": `${Math.cos(ang) * 90}px`, "--y": `${Math.sin(ang) * 90 - 20}px`, "--r": `${Math.random() * 360}deg` }} />;
                })}
              </div>
            )}
            {q.hint && <button className="gge-btn ghost" onClick={() => setShowHint((s) => !s)}>{showHint ? "Hide hint" : "💡 Hint"}</button>}
            <button className="gge-btn ghost" onClick={peek}>👀 Just show me</button>
            {completed[selected] && completed[selected].solved
              ? <button className="gge-btn solved" onClick={unmark}>✓ Mastered!</button>
              : <button className="gge-btn solve" onClick={markSolved}>I nailed it ✍️</button>}
          </div>

          {showHint && q.hint && (<div className="gge-reveal"><span className="lab">Hint</span>{q.hint}</div>)}
          {showAnswer && (
            <div className="gge-reveal">
              <span className="lab">Answer</span>
              {myAnswer.trim() && <div className="gge-youwrote">You wrote: <b>{myAnswer}</b></div>}
              <div className="ans">{q.answer}</div>
              {q.why && <div style={{ marginTop: 8, fontWeight: 600 }}>{q.why}</div>}
            </div>
          )}
        </div>

        <div className="gge-nav">
          <button className="gge-navbtn" disabled={selected <= 1} onClick={() => setSelected((s) => Math.max(1, s - 1))}>← Prev</button>
          <button className="gge-navbtn gge-today" onClick={() => setSelected(currentDay)}>Jump to today</button>
          <button className="gge-navbtn" disabled={selected >= TOTAL} onClick={() => setSelected((s) => Math.min(TOTAL, s + 1))}>Next →</button>
        </div>

        <div className="gge-section">Your 63-day word climb 🏔️</div>
        <div className="gge-grid">
          {QUESTIONS.map((item, idx) => {
            const c = completed[item.day] || {};
            const cls = ["gge-cell", c.solved ? "done" : (c.peeked ? "peeked" : ""), item.day === currentDay ? "today" : "", item.day === selected ? "sel" : ""].join(" ");
            const newWeek = idx % 7 === 0;
            return (
              <React.Fragment key={item.day}>
                {newWeek && <div className="gge-weeklab">Week {idx / 7 + 1}</div>}
                <button className={cls} onClick={() => setSelected(item.day)} title={`Day ${item.day} · ${item.type}`}>{c.solved ? "✓" : item.day}</button>
              </React.Fragment>
            );
          })}
        </div>
      </div>

      {showSettings && (
        <div className="gge-modal" onClick={() => setShowSettings(false)}>
          <div className="gge-modal-card" onClick={(e) => e.stopPropagation()}>
            <h3>When does summer start? 🐐</h3>
            <p>Pick the first day of the holidays. The climb lines “today’s challenge” up with the calendar from there.</p>
            <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} />
            <button className="gge-btn solve" style={{ width: "100%" }} onClick={() => setShowSettings(false)}>Save</button>
            <button className="gge-btn ghost" style={{ width: "100%", marginTop: 10 }}
              onClick={() => { if (window.confirm("Reset all progress?")) { setCompleted({}); setShowSettings(false); } }}>Reset progress</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GoatEnglish />);
</script>
</body>
</html>
