<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WW1 Detective · The Great War</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌺</text></svg>" />

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
  html, body { margin: 0; height: 100%; background: #e7dcc2; }
  #root { min-height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ============================================================================
   WW1 DETECTIVE — a deep dive into the First World War (for ~age 9)
   Honest but gentle. The player is the investigator. Edit chapters below.
   ========================================================================== */

const CHAPTERS = [
  {
    id:"spark", title:"The Spark", emoji:"💥",
    intro:"Case 1: How did a single event in 1914 set the whole world on fire?",
    questions:[
      { q:"The war began after an important man was assassinated in the city of Sarajevo in 1914. Who was he?",
        options:["Archduke Franz Ferdinand of Austria-Hungary","The King of England","A famous footballer","Napoleon"], correct:0,
        why:"Archduke Franz Ferdinand, heir to the throne of Austria-Hungary, was shot in Sarajevo in June 1914. That single event lit the fuse for the whole war." },
      { q:"How did the shooting of ONE man drag almost the entire world into war?",
        options:["By magic","Countries had promised to defend each other — like two big teams — so one quarrel pulled everyone in","Everyone just fancied a fight","It didn't"], correct:1,
        why:"Europe's countries had split into two big teams of allies who'd promised to protect one another. So when Austria-Hungary and Serbia quarrelled, the alliances dragged country after country into the fight." },
      { q:"The two sides were the Allies and the Central Powers. Which side were Britain and France on?",
        options:["The Central Powers","The Allies","Neither","Both at once"], correct:1,
        why:"Britain, France and Russia were the main 'Allies'. Germany, Austria-Hungary and their friends were the 'Central Powers'." },
      { q:"When the war broke out in 1914, what did huge crowds of people wrongly believe?",
        options:["That it would last fifty years","That it would be quick — 'over by Christmas'","That nobody would fight","That it was a joke"], correct:1,
        why:"Crowds cheered and thousands rushed to sign up, certain it would be a short, glorious adventure 'over by Christmas'. Instead it lasted more than four terrible years." },
      { q:"Which new way of fighting very quickly made the war grind to a halt?",
        options:["Trench warfare","Castle sieges","Sea battles only","Bows and arrows"], correct:0,
        why:"Both sides dug long trenches facing each other, and neither could break through. The war became a deadlock that barely moved for years." },
      { q:"What's the big lesson from how WW1 started?",
        options:["Small events can have giant consequences when the world is already tense","Nothing","War is fun","Alliances are always a good idea"], correct:0,
        why:"One shooting set off a chain reaction because the world was already tense and tangled in promises. Small sparks can start enormous fires." },
    ]
  },
  {
    id:"trenches", title:"In the Trenches", emoji:"🥾",
    intro:"Case 2: What was it actually like to live and fight in the trenches?",
    questions:[
      { q:"The dangerous open ground between the two sides' trenches had a chilling name. What was it?",
        options:["No Man's Land","The playground","The high street","The motorway"], correct:0,
        why:"No Man's Land was the deadly strip between the enemy trenches — covered in barbed wire and shell holes. Crossing it was terrifying." },
      { q:"Besides the enemy, what made daily trench life so miserable?",
        options:["Mud, rats, lice and cold","Too many sweets","Comfy beds","Swimming pools"], correct:0,
        why:"Soldiers lived in mud and water, surrounded by rats and lice, often freezing. Wet boots even caused a painful problem called 'trench foot'." },
      { q:"When soldiers were ordered to climb out and attack across No Man's Land, this was called going…",
        options:["'Over the top'","Down the slide","Around the back","Home"], correct:0,
        why:"Going 'over the top' meant climbing out of the trench straight into enemy fire — one of the most frightening orders a soldier could be given." },
      { q:"Why did neither side make much progress for years on end?",
        options:["Defending was far easier than attacking, thanks to trenches, barbed wire and machine guns","They kept getting lost","They were too polite","They ran out of land"], correct:0,
        why:"Machine guns and barbed wire made charging across open ground almost impossible, so the front line barely moved — a grim, years-long stalemate." },
      { q:"When telephone wires were cut, how were vital messages carried across the battlefield?",
        options:["By shouting only","By brave human 'runners' — and even carrier pigeons and dogs","By text message","By smoke signals only"], correct:1,
        why:"Human runners risked their lives carrying messages, and so did trained dogs and carrier pigeons — some pigeons became famous heroes!" },
      { q:"Why is it important to learn what trench life was really like?",
        options:["To remember and respect what those soldiers went through","To copy it","It isn't important","Just for fun"], correct:0,
        why:"Millions of ordinary young men endured these awful conditions. Understanding it helps us remember and respect them — and treasure peace." },
    ]
  },
  {
    id:"weapons", title:"Terrible New Machines", emoji:"⚙️",
    intro:"Case 3: WW1 unleashed frightening new machines of war. Can you identify them?",
    questions:[
      { q:"Which rapid-firing weapon made charging across open ground horribly deadly?",
        options:["The machine gun","The catapult","The longbow","The cannonball"], correct:0,
        why:"Machine guns could fire hundreds of bullets a minute, cutting down soldiers who tried to advance. They were a big reason the war got stuck." },
      { q:"A horrifying new weapon drifted across the trenches as a choking cloud. What was it?",
        options:["Poison gas","Confetti","Steam","A fog machine"], correct:0,
        why:"Poison gas (like chlorine and mustard gas) was first used in 1915. Soldiers carried gas masks and dreaded the shout of 'Gas! Gas!'." },
      { q:"Britain introduced a brand-new armoured machine that could crawl over trenches and crush barbed wire. What was it?",
        options:["The tank","The car","The bicycle","The bus"], correct:0,
        why:"The tank first rumbled into battle at the Somme in 1916. Early ones were slow and broke down a lot — but they were the future of war." },
      { q:"WW1 was the first big war fought in a place humans had only just learned to travel. Where?",
        options:["The sky — in aeroplanes","Underground cities","The Moon","The deep sea floor"], correct:0,
        why:"Aeroplanes were brand new. At first they just spied on the enemy from above, but soon pilots battled each other in mid-air 'dogfights'." },
      { q:"Beneath the waves, which hidden vessels secretly attacked ships?",
        options:["Submarines (U-boats)","Pirate galleons","Rowing boats","Cruise liners"], correct:0,
        why:"German submarines called U-boats secretly attacked ships — including the supply ships bringing food to Britain — a deadly danger at sea." },
      { q:"Why did all these new machines make WW1 so terribly deadly?",
        options:["Powerful new technology met old-fashioned tactics like charging in the open","Because the soldiers were weak","They actually weren't deadly","Magic"], correct:0,
        why:"At first, commanders used old tactics — marching at the enemy — against terrifying new weapons. It took years and dreadful losses to learn new ways to fight." },
    ]
  },
  {
    id:"world", title:"A World at War", emoji:"🌍",
    intro:"Case 4: Why is it called a WORLD war? Look beyond the trenches.",
    questions:[
      { q:"Why did the war involve people from nearly every continent?",
        options:["Big empires brought soldiers from all over the world","Everyone went on holiday together","Aliens joined in","It didn't"], correct:0,
        why:"Empires meant soldiers came from India, Africa, the Caribbean, Canada, Australia, New Zealand and beyond — millions of people from across the globe." },
      { q:"Soldiers from Australia and New Zealand (the 'ANZACs') fought a famous, costly campaign at…",
        options:["Gallipoli","London","the North Pole","a theme park"], correct:0,
        why:"At Gallipoli in 1915, ANZAC troops fought in brutal conditions far from home. It is still solemnly remembered every year on ANZAC Day." },
      { q:"Back home, with so many men away fighting, who took over many of the jobs in factories and on farms?",
        options:["Women","Robots","Nobody","Only very young children"], correct:0,
        why:"Millions of women built shells, farmed the land and nursed the wounded. The war changed what people believed women could do — and helped many win the right to vote." },
      { q:"Roughly how many HORSES did the armies use in WW1?",
        options:["About ten","A few hundred","Millions","None at all"], correct:2,
        why:"Millions of horses, mules and donkeys hauled guns, supplies and wounded soldiers. Animals — including dogs and pigeons — were vital, and very many never came home." },
      { q:"How did ordinary families back home help the war effort?",
        options:["By rationing food, working long hours, and growing their own vegetables","By doing nothing","By moving abroad","By sleeping all day"], correct:0,
        why:"With supplies short, families rationed food, grew their own veg and worked hard. The whole country — not just the soldiers — was part of the war." },
      { q:"So what does 'a world war' really mean?",
        options:["Almost the whole world was pulled in — soldiers AND ordinary families everywhere","Only two countries fought","It was fought on other planets","It happened only in Britain"], correct:0,
        why:"It reached nearly every corner of the globe and touched nearly every family — which is exactly why it left such a deep mark on the world." },
    ]
  },
  {
    id:"end", title:"The Truce & The End", emoji:"🕊️",
    intro:"Case 5: Even in the darkest war there were moments of hope — and, at last, an end.",
    questions:[
      { q:"At Christmas 1914, something astonishing happened in parts of the front line. What?",
        options:["Soldiers on both sides stopped fighting, met in No Man's Land, sang carols and even played football","They fought even harder","Nothing happened","They all went home"], correct:0,
        why:"In the unofficial 'Christmas Truce' of 1914, enemy soldiers climbed out, shook hands, swapped small gifts, sang carols and reportedly played football — an amazing reminder of their shared humanity." },
      { q:"Why is the Christmas Truce still so famous and moving today?",
        options:["It showed that even 'enemies' are ordinary human beings","It won the war","It was just a big party","It never really happened"], correct:0,
        why:"For a brief moment, men who'd been ordered to kill each other shared kindness instead. It reminds us that 'the enemy' is made of ordinary people too." },
      { q:"Which powerful country joined the Allies in 1917 and helped tip the balance?",
        options:["The United States","Antarctica","Atlantis","the Moon"], correct:0,
        why:"The USA joined in 1917, bringing fresh soldiers and huge supplies that helped the exhausted Allies push towards victory." },
      { q:"The fighting finally stopped at a very famous moment. When was it?",
        options:["The 11th hour of the 11th day of the 11th month, 1918","Midnight on New Year's Eve","A random Tuesday","It never stopped"], correct:0,
        why:"The Armistice ended the fighting at 11 o'clock in the morning on 11 November 1918 — the eleventh hour of the eleventh day of the eleventh month. That's why we hold a silence on Remembrance Day." },
      { q:"Which flower became the symbol for remembering those who died?",
        options:["The poppy","The rose","The daisy","The sunflower"], correct:0,
        why:"Red poppies grew on the churned-up battlefields of Flanders, and became the symbol of remembrance that many people still wear today." },
      { q:"Around how many people died in WW1 — and how should we feel about it?",
        options:["Around 16 million — a tragedy we remember with respect","Nobody died","Only a handful","It's funny"], correct:0,
        why:"Around 16 million soldiers and civilians died — one of the deadliest wars in history. We remember them quietly and with respect, and try hard to learn from it." },
      { q:"WW1 was hopefully nicknamed 'the war to end all wars'. Sadly, what happened about 20 years later?",
        options:["Lasting peace forever","The Second World War — partly because the peace deal was so harsh on Germany","Nothing at all","It restarted the very next day"], correct:1,
        why:"The peace treaty punished Germany harshly, leaving anger and hardship that a man named Hitler later used. That's the bridge to your other case files — history's events are all linked together." },
    ]
  },
];

const STORAGE_KEY = "ww1-detective:v1";
function loadState(){ try{ const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); }catch(e){} return null; }
const TOTAL = CHAPTERS.reduce((n,c)=>n+c.questions.length,0);

function WW1Detective(){
  const saved = useRef(loadState()).current;
  const [answers, setAnswers] = useState((saved && saved.answers) || {});
  const [ch, setCh] = useState(0);
  const [qi, setQi] = useState(0);

  useEffect(()=>{ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({ answers })); }catch(e){} }, [answers]);

  const chapter = CHAPTERS[ch];
  const q = chapter.questions[qi];
  const key = chapter.id + ":" + qi;
  const chosen = answers[key];
  const answered = chosen !== undefined && chosen !== null;

  const clues = Object.entries(answers).reduce((n,[k,v])=>{
    const [cid, i] = k.split(":");
    const c = CHAPTERS.find(x=>x.id===cid);
    if(c && c.questions[+i] && c.questions[+i].correct === v) return n+1;
    return n;
  },0);

  let rank = "Recruit";
  if (clues >= TOTAL) rank = "🏅 Chief Historian";
  else if (clues >= 24) rank = "🎖️ Inspector";
  else if (clues >= 15) rank = "🕵️ Detective";
  else if (clues >= 6) rank = "🔍 Junior Detective";
  else if (clues >= 1) rank = "🔎 Recruit on the case";

  function answer(i){ if(answered) return; setAnswers(p=>({ ...p, [key]: i })); }

  const chDone = chapter.questions.every((_,i)=> answers[chapter.id+":"+i] !== undefined);
  const chCorrect = chapter.questions.reduce((n,qq,i)=> n + (answers[chapter.id+":"+i] === qq.correct ? 1 : 0), 0);

  const css = `
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Nunito:wght@400;600;700;800&display=swap');
    .hd * { box-sizing:border-box; }
    .hd { font-family:'Nunito',sans-serif; color:#2b2520; min-height:100vh; padding:22px 16px 50px;
      background:
        radial-gradient(900px 480px at 50% -10%, #eef0d8 0%, transparent 60%),
        repeating-linear-gradient(0deg, rgba(90,90,40,.025) 0 1px, transparent 1px 26px),
        #e4e0c6; }
    .hd-wrap { max-width:680px; margin:0 auto; }
    .hd-head { text-align:center; }
    .hd-kicker { font-family:'Special Elite',monospace; letter-spacing:.25em; text-transform:uppercase; font-size:11px; color:#9a3b2e; }
    .hd-title { font-family:'Special Elite',monospace; font-size:clamp(28px,6.5vw,44px); margin:.12em 0 .04em; color:#2b2520; letter-spacing:.02em; }
    .hd-sub { font-weight:700; color:#6f6a48; font-size:14px; max-width:34ch; margin:2px auto 0; line-height:1.45; }

    .hd-stats { display:flex; gap:10px; margin:18px 0 14px; }
    .hd-stat { flex:1; background:#fdfbf0; border:2px solid #c4be96; border-radius:12px; padding:9px 12px; text-align:center; box-shadow:0 3px 0 #c4be96; }
    .hd-stat b { font-family:'Special Elite',monospace; font-size:20px; display:block; line-height:1.1; color:#9a3b2e; }
    .hd-stat span { font-size:11px; font-weight:800; color:#8a8560; text-transform:uppercase; letter-spacing:.5px; }

    .hd-tabs { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-bottom:16px; }
    .hd-tab { font-family:'Nunito',sans-serif; font-weight:800; font-size:13px; border:2px solid #c4be96; background:#fdfbf0; color:#6f6a48; padding:8px 12px; border-radius:10px; cursor:pointer; box-shadow:0 2px 0 #c4be96; }
    .hd-tab.active { background:#2b2520; color:#eef0d8; border-color:#2b2520; box-shadow:0 2px 0 #000; }
    .hd-tab .tick { color:#5a7a3a; }

    .hd-intro { background:#f3f1d9; border-left:4px solid #7a8a3a; border-radius:0 12px 12px 0; padding:11px 14px; font-weight:700; font-style:italic; color:#5f5d3a; font-size:14px; margin-bottom:14px; line-height:1.45; }

    .hd-card { background:#fffef6; border:2.5px solid #2b2520; border-radius:16px; padding:20px 20px 18px; box-shadow:7px 7px 0 #7a8a3a; position:relative; }
    .hd-file { font-family:'Special Elite',monospace; font-size:11px; color:#aab080; letter-spacing:.1em; }
    .hd-q { font-family:'Special Elite',monospace; font-size:clamp(17px,3.8vw,21px); line-height:1.45; margin:8px 0 0; color:#2b2520; }
    .hd-opts { display:flex; flex-direction:column; gap:9px; margin-top:16px; }
    .hd-opt { font-family:'Nunito',sans-serif; text-align:left; font-weight:700; font-size:15px; border:2px solid #cdca9c; background:#fdfbf0; color:#2b2520; padding:12px 14px; border-radius:11px; cursor:pointer; transition:transform .05s; }
    .hd-opt:hover:not(:disabled){ border-color:#7a8a3a; }
    .hd-opt:disabled{ cursor:default; }
    .hd-opt.correct{ background:#dcedcf; border-color:#5a7a3a; color:#3c5a27; }
    .hd-opt.wrong{ background:#f6dcd6; border-color:#9a3b2e; color:#7f2c20; }

    .hd-verdict { margin-top:15px; background:#f3f1d9; border-radius:12px; padding:13px 15px; animation:pop .25s ease; }
    .hd-verdict .stamp { font-family:'Special Elite',monospace; font-weight:700; font-size:14px; letter-spacing:.05em; }
    .hd-verdict.good .stamp{ color:#5a7a3a; }
    .hd-verdict.bad .stamp{ color:#9a3b2e; }
    .hd-verdict p { margin:6px 0 0; font-weight:600; line-height:1.5; font-size:15px; color:#54502f; }
    @keyframes pop { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

    .hd-nav { display:flex; align-items:center; justify-content:space-between; margin-top:18px; gap:10px; }
    .hd-navbtn { font-family:'Nunito',sans-serif; border:2px solid #c4be96; background:#fdfbf0; border-radius:11px; padding:9px 15px; font-weight:800; cursor:pointer; color:#2b2520; box-shadow:0 3px 0 #c4be96; }
    .hd-navbtn:disabled { opacity:.35; box-shadow:none; cursor:default; }
    .hd-navbtn.next { background:#7a8a3a; color:#fff; border-color:#5f6c2c; box-shadow:0 3px 0 #5f6c2c; }
    .hd-dots { display:flex; gap:6px; justify-content:center; margin-top:14px; }
    .hd-dot { width:9px; height:9px; border-radius:50%; background:#cdc99c; cursor:pointer; }
    .hd-dot.right { background:#5a7a3a; }
    .hd-dot.wrong { background:#9a3b2e; }
    .hd-dot.cur { box-shadow:0 0 0 2px #2b2520; }

    .hd-solved { text-align:center; font-family:'Special Elite',monospace; color:#5a7a3a; margin-top:16px; font-size:15px; }
  `;

  return (
    <div className="hd">
      <style>{css}</style>
      <div className="hd-wrap">
        <div className="hd-head">
          <div className="hd-kicker">Case files · the Great War, 1914–1918</div>
          <div className="hd-title">WW1 Detective 🌺</div>
          <div className="hd-sub">Crack each case to uncover how the world's first great war really happened.</div>
        </div>

        <div className="hd-stats">
          <div className="hd-stat"><b>{clues}<span style={{ fontSize: 12, color: "#aab080" }}> / {TOTAL}</span></b><span>Clues found</span></div>
          <div className="hd-stat"><b style={{ fontSize: 15 }}>{rank}</b><span>Your rank</span></div>
        </div>

        <div className="hd-tabs">
          {CHAPTERS.map((c, i) => {
            const done = c.questions.every((_, j) => answers[c.id + ":" + j] !== undefined);
            return (
              <button key={c.id} className={"hd-tab" + (i === ch ? " active" : "")} onClick={() => { setCh(i); setQi(0); }}>
                {c.emoji} {c.title} {done && <span className="tick">✓</span>}
              </button>
            );
          })}
        </div>

        <div className="hd-intro">{chapter.intro}</div>

        <div className="hd-card">
          <div className="hd-file">CASE {ch + 1} · CLUE {qi + 1} OF {chapter.questions.length}</div>
          <p className="hd-q">{q.q}</p>

          <div className="hd-opts">
            {q.options.map((o, i) => {
              let cls = "hd-opt";
              if (answered && i === q.correct) cls += " correct";
              else if (answered && i === chosen) cls += " wrong";
              return <button key={i} className={cls} disabled={answered} onClick={() => answer(i)}>{o}</button>;
            })}
          </div>

          {answered && (
            <div className={"hd-verdict " + (chosen === q.correct ? "good" : "bad")}>
              <div className="stamp">{chosen === q.correct ? "✓ CLUE FOUND" : "✗ NOT QUITE — HERE'S THE TRUTH"}</div>
              <p>{q.why}</p>
            </div>
          )}

          <div className="hd-nav">
            <button className="hd-navbtn" disabled={qi <= 0} onClick={() => setQi(i => Math.max(0, i - 1))}>← Back</button>
            {qi < chapter.questions.length - 1
              ? <button className="hd-navbtn next" onClick={() => setQi(i => i + 1)}>Next clue →</button>
              : (ch < CHAPTERS.length - 1
                  ? <button className="hd-navbtn next" onClick={() => { setCh(ch + 1); setQi(0); }}>Next case →</button>
                  : <button className="hd-navbtn next" disabled>Final clue</button>)}
          </div>

          <div className="hd-dots">
            {chapter.questions.map((qq, i) => {
              const a = answers[chapter.id + ":" + i];
              let cls = "hd-dot";
              if (a !== undefined) cls += (a === qq.correct ? " right" : " wrong");
              if (i === qi) cls += " cur";
              return <div key={i} className={cls} onClick={() => setQi(i)} />;
            })}
          </div>

          {chDone && <div className="hd-solved">Case {ch + 1} solved! {chCorrect} / {chapter.questions.length} clues found 🌺</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<WW1Detective />);
</script>
</body>
</html>
