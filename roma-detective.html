<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Roma Detective · The Roman Empire</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>" />

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
  html, body { margin: 0; height: 100%; background: #ece2d0; }
  #root { min-height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ============================================================================
   ROMA DETECTIVE — the Roman Empire (for ~age 9). Same case-file engine.
   ========================================================================== */

const CHAPTERS = [
  {
    id:"founding", title:"The She-Wolf's City", emoji:"🐺",
    intro:"Case 1: How did a tiny village of huts on seven hills become the mightiest city on Earth?",
    questions:[
      { q:"Roman legend says the city was founded by twin brothers who, as babies, were rescued and raised by a…",
        options:["She-wolf","Dragon","Eagle","Bear"], correct:0,
        why:"The legend of Romulus and Remus says the abandoned twins were suckled by a she-wolf. Romulus later founded the city in 753 BC and named it after himself: Rome." },
      { q:"At first Rome was ruled by kings. But the Romans threw out their last king and swore NEVER to have one again. What did they create instead?",
        options:["A republic — leaders chosen by citizens","Nothing — total chaos","Rule by the she-wolf","A queen instead"], correct:0,
        why:"Around 509 BC the Romans founded the Republic: instead of a king, elected leaders and a Senate. Romans stayed suspicious of kings for centuries." },
      { q:"Clever safety catch: instead of ONE top leader, the Republic always elected TWO consuls at the same time. Why two?",
        options:["So each could check the other — no one man got king-like power","Because one was always on holiday","Twins were lucky","They liked even numbers"], correct:0,
        why:"Two consuls, each able to block the other, and only one year in the job — all designed to stop any single man becoming a king. (Sound familiar? Splitting up power is the same trick you met in your other case files!)" },
      { q:"Rome's famous badge was 'SPQR'. What did it stand for?",
        options:["'The Senate and People of Rome'","'Super Powerful Quick Romans'","A gladiator's name","A type of road"], correct:0,
        why:"SPQR = Senatus Populusque Romanus — 'the Senate and People of Rome'. It was stamped on standards, buildings and coins: a reminder of WHO the state belonged to." },
      { q:"Rome sits on a famous number of hills. How many?",
        options:["Seven","Two","Fifty","None — it's flat"], correct:0,
        why:"Rome's Seven Hills. The city began as villages on those hilltops that slowly joined together — with the Forum, the meeting place, in the valley between." },
      { q:"What's the big lesson of Case 1?",
        options:["Rome grew from almost nothing — and built rules to stop kings returning","Rome was built in a day","Wolves make good builders","Legends are always true"], correct:0,
        why:"Rome rose from a tiny start, and its people designed clever rules — two consuls, a senate, short terms — to keep power from piling up in one man's hands. Remember that: it matters in Case 3." },
    ]
  },
  {
    id:"army", title:"The Unstoppable Legions", emoji:"🛡️",
    intro:"Case 2: Rome's army conquered a vast empire. What made the legions so nearly unbeatable?",
    questions:[
      { q:"Roman soldiers were organised into big, disciplined units of several thousand men. What were these called?",
        options:["Legions","Herds","Flocks","Gangs"], correct:0,
        why:"A legion held roughly 5,000 highly trained soldiers called legionaries, split into smaller squads — organised, drilled, and led by professional officers." },
      { q:"What was the legions' REAL secret weapon?",
        options:["Training and discipline — they drilled every single day","Magic swords","Being taller than everyone","Fighting angrily"], correct:0,
        why:"Romans weren't the biggest or fiercest — they were the best DRILLED. Endless training meant every soldier knew exactly what to do, even in terrifying chaos. Discipline beat rage, almost every time." },
      { q:"When arrows rained down, a Roman unit could lock its shields together over their heads and sides, like a walking shell. What was this formation nicknamed?",
        options:["The tortoise (testudo)","The hedgehog","The pancake","The umbrella"], correct:0,
        why:"The testudo — 'tortoise'. Shields locked on every side, the unit could crawl safely right up to enemy walls. Teamwork as armour!" },
      { q:"Roman soldiers didn't only fight. Between wars, what did they spend huge amounts of time building?",
        options:["Roads, bridges and forts","Sandcastles","Statues of themselves","Nothing"], correct:0,
        why:"The legions were also an engineering army: they built the famous straight roads, bridges and forts. That's why people said 'all roads lead to Rome' — the army could march ANYWHERE, fast." },
      { q:"Why were those famously straight roads such a war-winning invention?",
        options:["Armies, orders and supplies could move fast to any trouble spot","They looked pretty","Chariots got dizzy on bends","They weren't important"], correct:0,
        why:"Roads meant a legion could be moved quickly to any rebellion or invasion, and messages and food could flow across the empire. Rome's power travelled on its roads. (A lesson you've seen before: logistics wins wars.)" },
      { q:"Rome even conquered most of Britain. What giant structure did Emperor Hadrian build across northern England?",
        options:["Hadrian's Wall — the empire's edge","A giant lighthouse","London Bridge","A maze"], correct:0,
        why:"Hadrian's Wall (built from AD 122) marked the empire's northern frontier — 73 miles coast to coast. You can still walk along it today: the Roman Empire's edge runs through Britain!" },
    ]
  },
  {
    id:"caesar", title:"The Man Who Would Be King", emoji:"🗡️",
    intro:"Case 3: Julius Caesar — brilliant general, adored by his soldiers… and the man who broke the Republic. Crack the most dramatic case in Roman history.",
    questions:[
      { q:"Julius Caesar became hugely famous and rich by conquering which vast land (roughly modern France)?",
        options:["Gaul","Egypt","China","Australia"], correct:0,
        why:"Caesar spent years conquering Gaul, winning glory, treasure and a fiercely loyal army — which made the Senate back in Rome very nervous." },
      { q:"Roman law said a general must NOT bring his army into Italy. In 49 BC Caesar marched his legion across a small border river anyway. Its name still means 'the point of no return'. What river?",
        options:["The Rubicon","The Thames","The Nile","The Amazon"], correct:0,
        why:"Crossing the Rubicon meant civil war — there was no going back. Caesar reportedly said 'alea iacta est' — 'the die is cast'. We still say someone has 'crossed the Rubicon' today." },
      { q:"Caesar won the civil war and had himself made 'dictator for life'. Why did that horrify so many Romans?",
        options:["It smashed the old rule against any one man holding king-like power","He was a bad general","Romans loved kings","Dictators had to wear silly hats"], correct:0,
        why:"Remember Case 1? Rome's whole system — two consuls, one-year terms — existed to prevent exactly this. 'Dictator for LIFE' looked like the return of the kings, by another name." },
      { q:"On 15 March 44 BC — 'the Ides of March' — what happened to Caesar?",
        options:["Senators assassinated him in the Senate itself","He retired to the seaside","He was crowned king","He vanished mysteriously"], correct:0,
        why:"A group of senators — including his friend Brutus — stabbed Caesar to death, claiming they were saving the Republic. 'Beware the Ides of March' is still a famous warning." },
      { q:"Here's the twist: did killing Caesar SAVE the Republic?",
        options:["No — more civil war followed, and Rome ended up with emperors anyway","Yes — the Republic lasted forever after","Rome was abandoned","Everyone lived happily ever after"], correct:0,
        why:"No. His death unleashed more civil wars, and the winner — Caesar's adopted son Octavian — became AUGUSTUS, the first emperor. The Republic the killers meant to save was gone for good." },
      { q:"Augustus was clever: he took total power but refused the hated title 'king'. What did Rome's new rulers get called instead?",
        options:["Emperors","Head boys","Presidents","Pharaohs"], correct:0,
        why:"'Emperor' comes from imperator, a title soldiers shouted for a victorious general. Augustus kept the FORMS of the Republic while quietly holding all the power — and his title, Caesar, even became a word for ruler (Kaiser, Tsar!)." },
    ]
  },
  {
    id:"life", title:"A Day in Ancient Rome", emoji:"🏺",
    intro:"Case 4: Step into the streets. What was it actually like to live in the Roman world?",
    questions:[
      { q:"Rome's cities had fresh running water, carried for miles across valleys on huge arched bridges. What were these called?",
        options:["Aqueducts","Waterslides","Rainbows","Pipescrapers"], correct:0,
        why:"Aqueducts carried clean water from distant hills into cities — feeding fountains, homes and the famous baths. Some still stand (and one in Spain still carried water into modern times!)." },
      { q:"Where did Romans go to wash, exercise, gossip and do business — often all in one afternoon?",
        options:["The public baths","The moon","Bed","The library only"], correct:0,
        why:"The baths were Rome's social hub: hot rooms, cold pools, exercise yards, even libraries and snack sellers. Less like a bathroom — more like a leisure centre." },
      { q:"In the giant Colosseum, crowds of 50,000 watched trained fighters battle. What were these fighters called?",
        options:["Gladiators","Knights","Ninjas","Referees"], correct:0,
        why:"Gladiators — mostly enslaved people and prisoners — fought in the arena. Star fighters became celebrities, but it was a brutal entertainment, and a reminder that Rome could be very cruel as well as brilliant." },
      { q:"Roman children played with toys you'd recognise. Which of these did Roman kids REALLY have?",
        options:["Board games, dice, marbles and toy chariots","Video games","Bicycles","Trading cards"], correct:0,
        why:"Roman children played board games, knucklebones and dice, rolled marbles and raced toy chariots. Some of their graffiti and game boards are still scratched into Roman pavements!" },
      { q:"In AD 79 a volcano called Vesuvius erupted and buried a whole Roman town in ash — preserving it like a time capsule. Which town?",
        options:["Pompeii","Paris","Sparta","Atlantis"], correct:0,
        why:"Pompeii was buried so suddenly that streets, houses, bread in ovens and wall-paintings were preserved. Archaeologists digging it up can walk through a frozen Roman day — a tragedy that became a time machine." },
      { q:"What language did the Romans speak — the language their empire spread across Europe?",
        options:["Latin","English","Egyptian","Klingon"], correct:0,
        why:"Latin! It grew into French, Spanish and Italian, gave English half its words — and it's exactly what's being studied on the Mind Matters side of the family. You're both investigating the same empire!" },
    ]
  },
  {
    id:"fall", title:"Why Rome Fell — and Never Died", emoji:"🏛️",
    intro:"Case 5: The mightiest empire in the world crumbled. How? And why do detectives say Rome never truly died?",
    questions:[
      { q:"The empire grew so enormous that one emperor decided it was impossible to run alone. What did Rome do?",
        options:["Split into a Western and an Eastern half","Sold it","Gave it back","Moved it to the Moon"], correct:0,
        why:"The empire split into West (ruled from Rome) and East (ruled from Constantinople). Two halves, two fates — remember that for the final clue." },
      { q:"The Western empire slowly weakened. What problems piled up? (Pick the detective's full list.)",
        options:["Invasions, money troubles, plagues, and endless fights over who should be emperor","Just one bad harvest","Everyone overslept","Too many holidays"], correct:0,
        why:"There was no single cause — historians still argue! Tribes invading across the borders, a broken economy, disease, and constant civil wars over the throne all wore the West down together. Big collapses usually have MANY causes." },
      { q:"In AD 476 something happened that people call 'the Fall of Rome'. What was it?",
        options:["The last Western emperor was removed from power","Rome sank into the sea","Everyone forgot where Rome was","Aliens arrived"], correct:0,
        why:"A soldier called Odoacer removed the last Western emperor — a boy, ironically named Romulus, like the founder. After about 1,200 years, the Western Roman Empire was over." },
      { q:"But here's the clue most people miss: what happened to the EASTERN half of the empire?",
        options:["It carried on for almost 1,000 MORE years","It fell the same day","It never existed","It moved to Britain"], correct:0,
        why:"The Eastern (Byzantine) Empire, ruled from Constantinople, lasted until 1453 — nearly a thousand years after the West fell. So 'the fall of Rome' is really only half the story!" },
      { q:"Rome's fall teaches the same lesson as another case file of yours. Which one?",
        options:["Even the strongest power can fail if it stops adapting — like France's Maginot Line","That walls always work","That empires last forever","No lesson at all"], correct:0,
        why:"Just like the Maginot Line: strength today is no guarantee for tomorrow. Rome relied on old strengths while the world changed around it. Great detectives spot the same pattern across different cases." },
      { q:"Final clue: why do historians say Rome 'never truly died'?",
        options:["Its language, laws, roads, calendar and ideas live on all around us","Romans are hiding underground","It did die, completely","Because of ghosts"], correct:0,
        why:"Look around: our calendar (July = Julius Caesar, August = Augustus!), our alphabet, many of our laws, city plans and roads, and languages across Europe all come from Rome. The empire fell — the IDEAS conquered the future. Case closed. 🏛️" },
    ]
  },
];

const STORAGE_KEY = "roma-detective:v1";
function loadState(){ try{ const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); }catch(e){} return null; }
const TOTAL = CHAPTERS.reduce((n,c)=>n+c.questions.length,0);

function RomaDetective(){
  const saved = useRef(loadState()).current;
  const [answers, setAnswers] = useState((saved && saved.answers) || {});
  const [ch, setCh] = useState(0);
  const [qi, setQi] = useState(0);

  useEffect(()=>{ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({ answers })); }catch(e){} }, [answers]);

  const chapter = CHAPTERS[ch];
  const q = chapter.questions[qi];
  const key = chapter.id + ":" + qi;
  const chosen = answers[key];
  const answered = chosen !== undefined && chosen !== null;

  const clues = Object.entries(answers).reduce((n,[k,v])=>{
    const [cid, i] = k.split(":");
    const c = CHAPTERS.find(x=>x.id===cid);
    if(c && c.questions[+i] && c.questions[+i].correct === v) return n+1;
    return n;
  },0);

  let rank = "Recruit";
  if (clues >= TOTAL) rank = "🏛️ Chief Historian";
  else if (clues >= 24) rank = "🎖️ Inspector";
  else if (clues >= 15) rank = "🕵️ Detective";
  else if (clues >= 6) rank = "🔍 Junior Detective";
  else if (clues >= 1) rank = "🔎 Recruit on the case";

  function answer(i){ if(answered) return; setAnswers(p=>({ ...p, [key]: i })); }

  const chDone = chapter.questions.every((_,i)=> answers[chapter.id+":"+i] !== undefined);
  const chCorrect = chapter.questions.reduce((n,qq,i)=> n + (answers[chapter.id+":"+i] === qq.correct ? 1 : 0), 0);

  const css = `
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Nunito:wght@400;600;700;800&display=swap');
    .hd * { box-sizing:border-box; }
    .hd { font-family:'Nunito',sans-serif; color:#2e2419; min-height:100vh; padding:22px 16px 50px;
      background:
        radial-gradient(900px 480px at 50% -10%, #f6edda 0%, transparent 60%),
        repeating-linear-gradient(0deg, rgba(140,90,40,.025) 0 1px, transparent 1px 26px),
        #ece2d0; }
    .hd-wrap { max-width:680px; margin:0 auto; }
    .hd-head { text-align:center; }
    .hd-kicker { font-family:'Special Elite',monospace; letter-spacing:.25em; text-transform:uppercase; font-size:11px; color:#a3562e; }
    .hd-title { font-family:'Special Elite',monospace; font-size:clamp(28px,6.5vw,44px); margin:.12em 0 .04em; color:#2e2419; letter-spacing:.02em; }
    .hd-sub { font-weight:700; color:#7d6a4d; font-size:14px; max-width:34ch; margin:2px auto 0; line-height:1.45; }

    .hd-stats { display:flex; gap:10px; margin:18px 0 14px; }
    .hd-stat { flex:1; background:#fdf8ec; border:2px solid #cfbd98; border-radius:12px; padding:9px 12px; text-align:center; box-shadow:0 3px 0 #cfbd98; }
    .hd-stat b { font-family:'Special Elite',monospace; font-size:20px; display:block; line-height:1.1; color:#a3562e; }
    .hd-stat span { font-size:11px; font-weight:800; color:#9c8862; text-transform:uppercase; letter-spacing:.5px; }

    .hd-tabs { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-bottom:16px; }
    .hd-tab { font-family:'Nunito',sans-serif; font-weight:800; font-size:13px; border:2px solid #cfbd98; background:#fdf8ec; color:#7d6a4d; padding:8px 12px; border-radius:10px; cursor:pointer; box-shadow:0 2px 0 #cfbd98; }
    .hd-tab.active { background:#2e2419; color:#f6edda; border-color:#2e2419; box-shadow:0 2px 0 #000; }
    .hd-tab .tick { color:#3f7d4f; }

    .hd-intro { background:#f6eed9; border-left:4px solid #a3562e; border-radius:0 12px 12px 0; padding:11px 14px; font-weight:700; font-style:italic; color:#6f5d40; font-size:14px; margin-bottom:14px; line-height:1.45; }

    .hd-card { background:#fffcf3; border:2.5px solid #2e2419; border-radius:16px; padding:20px 20px 18px; box-shadow:7px 7px 0 #a3562e; position:relative; }
    .hd-file { font-family:'Special Elite',monospace; font-size:11px; color:#bda57e; letter-spacing:.1em; }
    .hd-q { font-family:'Special Elite',monospace; font-size:clamp(17px,3.8vw,21px); line-height:1.45; margin:8px 0 0; color:#2e2419; }
    .hd-opts { display:flex; flex-direction:column; gap:9px; margin-top:16px; }
    .hd-opt { font-family:'Nunito',sans-serif; text-align:left; font-weight:700; font-size:15px; border:2px solid #dcc9a0; background:#fdf8ec; color:#2e2419; padding:12px 14px; border-radius:11px; cursor:pointer; transition:transform .05s; }
    .hd-opt:hover:not(:disabled){ border-color:#a3562e; }
    .hd-opt:disabled{ cursor:default; }
    .hd-opt.correct{ background:#e0edd4; border-color:#3f7d4f; color:#2c5a37; }
    .hd-opt.wrong{ background:#f6ddd2; border-color:#a3562e; color:#7f3f20; }

    .hd-verdict { margin-top:15px; background:#f6eed9; border-radius:12px; padding:13px 15px; animation:pop .25s ease; }
    .hd-verdict .stamp { font-family:'Special Elite',monospace; font-weight:700; font-size:14px; letter-spacing:.05em; }
    .hd-verdict.good .stamp{ color:#3f7d4f; }
    .hd-verdict.bad .stamp{ color:#a3562e; }
    .hd-verdict p { margin:6px 0 0; font-weight:600; line-height:1.5; font-size:15px; color:#5b4d36; }
    @keyframes pop { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

    .hd-nav { display:flex; align-items:center; justify-content:space-between; margin-top:18px; gap:10px; }
    .hd-navbtn { font-family:'Nunito',sans-serif; border:2px solid #cfbd98; background:#fdf8ec; border-radius:11px; padding:9px 15px; font-weight:800; cursor:pointer; color:#2e2419; box-shadow:0 3px 0 #cfbd98; }
    .hd-navbtn:disabled { opacity:.35; box-shadow:none; cursor:default; }
    .hd-navbtn.next { background:#a3562e; color:#fff; border-color:#7f3f20; box-shadow:0 3px 0 #7f3f20; }
    .hd-dots { display:flex; gap:6px; justify-content:center; margin-top:14px; }
    .hd-dot { width:9px; height:9px; border-radius:50%; background:#d8c8a3; cursor:pointer; }
    .hd-dot.right { background:#3f7d4f; }
    .hd-dot.wrong { background:#a3562e; }
    .hd-dot.cur { box-shadow:0 0 0 2px #2e2419; }

    .hd-solved { text-align:center; font-family:'Special Elite',monospace; color:#3f7d4f; margin-top:16px; font-size:15px; }
  `;

  return (
    <div className="hd">
      <style>{css}</style>
      <div className="hd-wrap">
        <div className="hd-head">
          <div className="hd-kicker">Case files · SPQR</div>
          <div className="hd-title">Roma Detective 🏛️</div>
          <div className="hd-sub">Crack the case of the mightiest empire in history — from a she-wolf's cave to the fall of Rome.</div>
        </div>

        <div className="hd-stats">
          <div className="hd-stat"><b>{clues}<span style={{ fontSize: 12, color: "#bda57e" }}> / {TOTAL}</span></b><span>Clues found</span></div>
          <div className="hd-stat"><b style={{ fontSize: 15 }}>{rank}</b><span>Your rank</span></div>
        </div>

        <div className="hd-tabs">
          {CHAPTERS.map((c, i) => {
            const done = c.questions.every((_, j) => answers[c.id + ":" + j] !== undefined);
            return (
              <button key={c.id} className={"hd-tab" + (i === ch ? " active" : "")} onClick={() => { setCh(i); setQi(0); }}>
                {c.emoji} {c.title} {done && <span className="tick">✓</span>}
              </button>
            );
          })}
        </div>

        <div className="hd-intro">{chapter.intro}</div>

        <div className="hd-card">
          <div className="hd-file">CASE {ch + 1} · CLUE {qi + 1} OF {chapter.questions.length}</div>
          <p className="hd-q">{q.q}</p>

          <div className="hd-opts">
            {q.options.map((o, i) => {
              let cls = "hd-opt";
              if (answered && i === q.correct) cls += " correct";
              else if (answered && i === chosen) cls += " wrong";
              return <button key={i} className={cls} disabled={answered} onClick={() => answer(i)}>{o}</button>;
            })}
          </div>

          {answered && (
            <div className={"hd-verdict " + (chosen === q.correct ? "good" : "bad")}>
              <div className="stamp">{chosen === q.correct ? "✓ CLUE FOUND" : "✗ NOT QUITE — HERE'S THE TRUTH"}</div>
              <p>{q.why}</p>
            </div>
          )}

          <div className="hd-nav">
            <button className="hd-navbtn" disabled={qi <= 0} onClick={() => setQi(i => Math.max(0, i - 1))}>← Back</button>
            {qi < chapter.questions.length - 1
              ? <button className="hd-navbtn next" onClick={() => setQi(i => i + 1)}>Next clue →</button>
              : (ch < CHAPTERS.length - 1
                  ? <button className="hd-navbtn next" onClick={() => { setCh(ch + 1); setQi(0); }}>Next case →</button>
                  : <button className="hd-navbtn next" disabled>Final clue</button>)}
          </div>

          <div className="hd-dots">
            {chapter.questions.map((qq, i) => {
              const a = answers[chapter.id + ":" + i];
              let cls = "hd-dot";
              if (a !== undefined) cls += (a === qq.correct ? " right" : " wrong");
              if (i === qi) cls += " cur";
              return <div key={i} className={cls} onClick={() => setQi(i)} />;
            })}
          </div>

          {chDone && <div className="hd-solved">Case {ch + 1} solved! {chCorrect} / {chapter.questions.length} clues found 🏛️</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RomaDetective />);
</script>
</body>
</html>
