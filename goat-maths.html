const QUESTIONS = [

  { day: 8, type: "Fractions", diff: 1, q: "What is 1/4 of 20?", hint: "Split 20 into 4 equal groups.", answer: "5", why: "20 ÷ 4 = 5." },

  { day: 10, type: "Number Power", diff: 2, q: "What is 9 × 4?", hint: "Nine fours.", answer: "36", why: "9 × 4 = 36." },
  { day: 11, type: "Fractions", diff: 2, q: "What is 2/3 of 9?", hint: "Find a third of 9 first, then take 2 of them.", answer: "6", why: "9 ÷ 3 = 3, and 3 × 2 = 6." },
  { day: 12, type: "Fun", diff: 2, q: "A spider has 8 legs. How many legs do 4 spiders have altogether?", hint: "4 lots of 8.", answer: "32", why: "4 × 8 = 32." },

  { day: 29, type: "Number Power", diff: 3, q: "What goes in the box?  ▢ × 4 = 28", hint: "What times 4 makes 28?", answer: "7", why: "28 ÷ 4 = 7." },

  { day: 36, type: "Fractions", diff: 2, q: "What is 1/5 of 25?", hint: "Split 25 into 5 equal groups.", answer: "5", why: "25 ÷ 5 = 5." },
  { day: 37, type: "Brain Teaser", diff: 3, q: "A pattern goes 1, 3, 6, 10, 15, … What number comes next, and what is the rule?", hint: "Look at the jumps: +2, +3, +4, +5 …", answer: "21", why: "Each jump is one bigger than the last, so the next jump is +6: 15 + 6 = 21." },
  { day: 38, type: "Number Power", diff: 2, q: "What is 6 × 9?", hint: "Six nines — one less than six tens.", answer: "54", why: "6 × 9 = 60 − 6 = 54." },
  { day: 39, type: "Fractions", diff: 3, q: "What is 5/6 of 12?", hint: "Find 1/6 of 12 first, then take 5 of them.", answer: "10", why: "12 ÷ 6 = 2, and 2 × 5 = 10." },
  { day: 40, type: "Brain Teaser", diff: 2, q: "A book costs £5. A pen costs £2 less than the book. How much do a book and a pen cost together?", hint: "Work out the pen's price first.", answer: "£8", why: "The pen is £5 − £2 = £3, and £5 + £3 = £8." },
  { day: 41, type: "Fractions", diff: 2, q: "There are 20 cars in a car park. 1/4 of them are red. How many cars are NOT red?", hint: "Work out how many ARE red first.", answer: "15", why: "1/4 of 20 is 5 red cars, so 20 − 5 = 15 are not red." },
  { day: 42, type: "Fun", diff: 2, q: "How many months of the year have 31 days?", hint: "Use the knuckle trick if you know it!", answer: "7", why: "Jan, Mar, May, Jul, Aug, Oct and Dec — that's 7." },

  // ---- Week 7 ----
  { day: 43, type: "Number Power", diff: 3, q: "What is 11 × 11?", hint: "11 × 11 = 11 × 10 + 11.", answer: "121", why: "110 + 11 = 121." },
  { day: 44, type: "Brain Teaser", diff: 3, q: "Two numbers multiply together to make 24, and they add up to 11. What are the two numbers?", hint: "List pairs that multiply to 24: 1&24, 2&12, 3&8, 4&6 — which adds to 11?", answer: "3 and 8", why: "3 × 8 = 24 and 3 + 8 = 11." },
  { day: 45, type: "Fractions", diff: 2, q: "What is 3/5 of 30?", hint: "Find 1/5 of 30 first, then take 3 of them.", answer: "18", why: "30 ÷ 5 = 6, and 6 × 3 = 18." },

const TYPE_META = {
  "Number Power": { color: "#2f7ef0", soft: "#dbeafe", glyph: "×" },
  "Fractions":    { color: "#15a371", soft: "#d2f3e4", glyph: "½" },
  "Brain Teaser": { color: "#f5681e", soft: "#ffe2d1", glyph: "?" },
  "Fun":          { color: "#7c5cf6", soft: "#e7defe", glyph: "★" },
};

const STORAGE_KEY = "goat-goals-maths:v1";   // <- different key from sister's game, so progress never clashes
const TOTAL = QUESTIONS.length;

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function daysBetween(startISO, endISO) {
  const a = new Date(startISO + "T00:00:00");
  const b = new Date(endISO + "T00:00:00");
  return Math.round((b - a) / 86400000);
}
function clamp(n, lo, hi) { return Math.min(Math.max(n, lo), hi); }
function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch (e) {}
  return null;
}

function GoatMaths() {
  const saved = useRef(loadState()).current;
  const [startDate, setStartDate] = useState((saved && saved.startDate) || todayISO());
  const [completed, setCompleted] = useState((saved && saved.completed) || {});
  const currentDay = clamp(daysBetween(startDate, todayISO()) + 1, 1, TOTAL);
  const [selected, setSelected] = useState(() => clamp(daysBetween(((saved && saved.startDate) || todayISO()), todayISO()) + 1, 1, TOTAL));
  const [showHint, setShowHint] = useState(false);
  const [showAnswer, setShowAnswer] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [burst, setBurst] = useState(0);

  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ startDate, completed })); } catch (e) {} }, [startDate, completed]);
  useEffect(() => { setShowHint(false); setShowAnswer(false); }, [selected]);

  const q = QUESTIONS.find((x) => x.day === selected);
  const meta = TYPE_META[q.type] || TYPE_META["Fun"];
  const solvedCount = Object.values(completed).filter((c) => c.solved).length;

  let streak = 0;
  for (let d = currentDay; d >= 1; d--) { if (completed[d] && completed[d].solved) streak++; else break; }

  function markSolved() { setCompleted((prev) => ({ ...prev, [selected]: { ...(prev[selected] || {}), solved: true } })); setBurst((b) => b + 1); }
  function unmark() { setCompleted((prev) => { const n = { ...prev }; if (n[selected]) n[selected] = { ...n[selected], solved: false }; return n; }); }
  function peek() { setShowAnswer(true); setCompleted((prev) => ({ ...prev, [selected]: { ...(prev[selected] || {}), peeked: true } })); }

  const css = `
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Nunito:wght@400;600;700;800&display=swap');
    .ggm * { box-sizing: border-box; }
    .ggm { font-family:'Nunito',sans-serif; color:#15233b; min-height:100vh; padding:22px 16px 50px;
      background: radial-gradient(900px 460px at 88% -6%, #fff0cf 0%, transparent 50%), radial-gradient(1000px 520px at 8% 0%, #d4ecff 0%, transparent 55%), radial-gradient(800px 520px at 50% 116%, #d9f5e6 0%, transparent 55%), #f4f9ff; position:relative; }
    .ggm-wrap { max-width:720px; margin:0 auto; position:relative; }
    .ggm-back { display:inline-block; text-decoration:none; color:#7a8aa3; font-weight:800; font-size:14px; margin-bottom:14px; }
    .ggm-back:hover { color:#2f7ef0; }
    .ggm-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:18px; }
    .ggm-title { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(28px,7vw,44px); line-height:.98; letter-spacing:-1px; margin:0; }
    .ggm-title .hl { color:#f5a623; }

    .ggm-gear:active { transform:translateY(2px); box-shadow:0 1px 0 #e2ebf6; }
    .ggm-stats { display:flex; gap:10px; margin-bottom:18px; }

    .ggm-cell { aspect-ratio:1; border-radius:11px; border:2px solid #e2ebf6; background:#fff; font-weight:800; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#aab7cb; position:relative; }
    .ggm-cell.done { background:#15a371; color:#fff; border-color:#15a371; }
    .ggm-cell.peeked { background:#eef3fb; color:#9aa9bf; border-color:#dde6f2; }
    .ggm-cell.today { border-color:#15233b; border-width:2.5px; color:#15233b; box-shadow:0 0 0 3px #ffe0a3; }
    .ggm-cell.sel { transform:scale(1.08); box-shadow:0 0 0 2px ${meta.color}; }
    .ggm-weeklab { font-size:11px; font-weight:800; color:#b6c2d6; grid-column:1 / -1; margin-top:6px; text-transform:uppercase; letter-spacing:.5px; }
    .ggm-modal { position:fixed; inset:0; background:rgba(21,35,59,.5); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }
    .ggm-modal-card { background:#f4f9ff; border:2.5px solid #15233b; border-radius:22px; padding:24px; max-width:380px; width:100%; box-shadow:8px 8px 0 #f5a623; }
    .ggm-modal-card h3 { font-family:'Bricolage Grotesque',sans-serif; margin:0 0 6px; font-size:22px; }
    .ggm-modal-card p { font-size:14px; color:#5b6b82; font-weight:600; margin:0 0 16px; line-height:1.5; }
    .ggm-modal-card input { font-family:'Nunito',sans-serif; font-size:16px; font-weight:700; padding:10px 12px; border:2px solid #15233b; border-radius:12px; width:100%; margin-bottom:16px; }
    .ggm-confetti { position:absolute; left:50%; top:30%; pointer-events:none; }
    .ggm-confetti i { position:absolute; width:9px; height:9px; border-radius:2px; animation:fly .9s ease-out forwards; }
    @keyframes fly { to { transform:translate(var(--x), var(--y)) rotate(var(--r)); opacity:0; } }
  `;
  const confettiColors = ["#2f7ef0", "#15a371", "#f5681e", "#7c5cf6", "#f5a623"];

  return (
    <div className="ggm">
      <style>{css}</style>
      <div className="ggm-wrap">
        <a className="ggm-back" href="index.html">← GOAT Goals</a>
        <div className="ggm-head">
          <div>
            <h1 className="ggm-title">GOAT <span className="hl">Maths</span> 🐐</h1>
            <div className="ggm-sub">Climb to greatness · one challenge a day · 63 days</div>
          </div>
          <button className="ggm-gear" onClick={() => setShowSettings(true)} title="Settings">⚙</button>
        </div>

        <div className="ggm-stats">
          <div className="ggm-stat"><b>{solvedCount}<span style={{ fontSize: 13, color: "#b6c2d6" }}> / {TOTAL}</span></b><span>Conquered</span></div>
          <div className="ggm-stat"><b>{streak} 🔥</b><span>Day streak</span></div>
          <div className="ggm-stat"><b>{currentDay}</b><span>Today is day</span></div>
        </div>

        <div className="ggm-card">
          <div className="watermark">{meta.glyph}</div>
          <span className="ggm-badge">{meta.glyph} {q.type}</span>
          <div className="ggm-day">DAY {q.day}{q.day === currentDay ? " · today" : q.day < currentDay ? " · catch-up" : " · coming up"}</div>
          <p className="ggm-q">{q.q}</p>
          <div className="ggm-diff">Challenge level: <span className="dot">{"▲".repeat(q.diff)}</span><span style={{ color: "#e3eaf4" }}>{"▲".repeat(3 - q.diff)}</span></div>

          <div className="ggm-actions">
            {burst > 0 && (
              <div className="ggm-confetti" key={burst}>
                {Array.from({ length: 14 }).map((_, i) => {
                  const ang = (i / 14) * Math.PI * 2;
                  return <i key={i} style={{ background: confettiColors[i % confettiColors.length], "--x": `${Math.cos(ang) * 90}px`, "--y": `${Math.sin(ang) * 90 - 20}px`, "--r": `${Math.random() * 360}deg` }} />;
                })}
              </div>
            )}
            {q.hint && <button className="ggm-btn ghost" onClick={() => setShowHint((s) => !s)}>{showHint ? "Hide hint" : "💡 Hint"}</button>}
            <button className="ggm-btn ghost" onClick={peek}>👀 Reveal answer</button>
            {completed[selected] && completed[selected].solved
              ? <button className="ggm-btn solved" onClick={unmark}>✓ Conquered!</button>
              : <button className="ggm-btn solve" onClick={markSolved}>I nailed it 💪</button>}
          </div>

          {showHint && q.hint && (<div className="ggm-reveal"><span className="lab">Hint</span>{q.hint}</div>)}
          {showAnswer && (
            <div className="ggm-reveal">
              <span className="lab">Answer</span>
              <div className="ans">{q.answer}</div>
              {q.why && <div style={{ marginTop: 8, fontWeight: 600 }}>{q.why}</div>}
            </div>
          )}
        </div>

        <div className="ggm-nav">
          <button className="ggm-navbtn" disabled={selected <= 1} onClick={() => setSelected((s) => Math.max(1, s - 1))}>← Prev</button>
          <button className="ggm-navbtn ggm-today" onClick={() => setSelected(currentDay)}>Jump to today</button>
          <button className="ggm-navbtn" disabled={selected >= TOTAL} onClick={() => setSelected((s) => Math.min(TOTAL, s + 1))}>Next →</button>
        </div>

        <div className="ggm-section">Your 63-day climb 🏔️</div>
        <div className="ggm-grid">
          {QUESTIONS.map((item, idx) => {
            const c = completed[item.day] || {};
            const cls = ["ggm-cell", c.solved ? "done" : (c.peeked ? "peeked" : ""), item.day === currentDay ? "today" : "", item.day === selected ? "sel" : ""].join(" ");
            const newWeek = idx % 7 === 0;
            return (
              <React.Fragment key={item.day}>
                {newWeek && <div className="ggm-weeklab">Week {idx / 7 + 1}</div>}
                <button className={cls} onClick={() => setSelected(item.day)} title={`Day ${item.day} · ${item.type}`}>{c.solved ? "✓" : item.day}</button>
              </React.Fragment>
            );
          })}
        </div>
      </div>

      {showSettings && (
        <div className="ggm-modal" onClick={() => setShowSettings(false)}>
          <div className="ggm-modal-card" onClick={(e) => e.stopPropagation()}>
            <h3>When does summer start? 🐐</h3>
            <p>Pick the first day of the holidays. The climb lines “today’s challenge” up with the calendar from there.</p>
            <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} />
            <button className="ggm-btn solve" style={{ width: "100%" }} onClick={() => setShowSettings(false)}>Save</button>
            <button className="ggm-btn ghost" style={{ width: "100%", marginTop: 10 }}
              onClick={() => { if (window.confirm("Reset all progress?")) { setCompleted({}); setShowSettings(false); } }}>Reset progress</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GoatMaths />);
</script>
</body>
</html>
