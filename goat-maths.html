const { useState, useEffect, useRef } = React;

/* ============================================================================
   GOAT GOALS · GOAT Maths — one challenge a day, 9 weeks (63 days)
   ----------------------------------------------------------------------------
   Pitched for a bright 9-year-old (UK Year 4–5).
   To edit a question, change the QUESTIONS array below:
     { day:1, type:"Number Power", diff:2,   // Number Power | Fractions | Brain Teaser | Fun
       q:"...", hint:"...", answer:"...", why:"..." }
   ========================================================================== */

const QUESTIONS = [
  // ---- Week 1 ----
  { day: 1, type: "Fractions", diff: 1, q: "What is 1/2 of 24?", hint: "Split 24 into two equal piles.", answer: "12", why: "24 ÷ 2 = 12." },

  { day: 4, type: "Fun", diff: 2, q: "What number comes next? 2, 4, 8, 16, 32, …", hint: "Each number is double the one before.", answer: "64", why: "32 × 2 = 64." },

  { day: 6, type: "Brain Teaser", diff: 3, q: "Two numbers multiply together to make 12, and they add up to 7. What are the two numbers?", hint: "List pairs that multiply to 12: 1&12, 2&6, 3&4 — which adds to 7?", answer: "3 and 4", why: "3 × 4 = 12 and 3 + 4 = 7." },
  { day: 7, type: "Number Power", diff: 3, q: "Work out:  3 + 4 × 5", hint: "Do the multiplying BEFORE the adding.", answer: "23", why: "4 × 5 = 20 first, then 3 + 20 = 23. (Multiply before you add!)" },

  // ---- Week 2 ----
  { day: 8, type: "Fractions", diff: 3, q: "What is 2/5 of 20?", hint: "Find 1/5 of 20 first, then take 2 of them.", answer: "8", why: "20 ÷ 5 = 4, and 4 × 2 = 8." },
  { day: 9, type: "Brain Teaser", diff: 3, q: "24 grapes are shared equally between 4 children. Then 2 more children arrive and they re-share fairly. How many grapes does each child get now?", hint: "How many children share the 24 grapes now?", answer: "4 grapes each", why: "Now 6 children share 24: 24 ÷ 6 = 4." },
  { day: 10, type: "Number Power", diff: 3, q: "What is 9 × 6?", hint: "Nine sixes — one less than nine sevens? No: 6 less than 9 tens.", answer: "54", why: "9 × 6 = 54." },
  { day: 11, type: "Fractions", diff: 4, q: "What is 3/4 of 36?", hint: "Find a quarter of 36, then take 3 of them.", answer: "27", why: "36 ÷ 4 = 9, and 9 × 3 = 27." },
  { day: 12, type: "Fun", diff: 3, q: "A spider has 8 legs. How many legs do 7 spiders have altogether?", hint: "7 lots of 8.", answer: "56", why: "7 × 8 = 56." },
  { day: 13, type: "Brain Teaser", diff: 5, q: "In a field there are chickens (2 legs each) and sheep (4 legs each). There are 8 heads and 22 legs altogether. How many sheep are there?", hint: "If all 8 were chickens that's 16 legs. Each sheep adds 2 extra legs.", answer: "3 sheep", why: "8 chickens = 16 legs. There are 22 − 16 = 6 extra legs, and each sheep adds 2: 6 ÷ 2 = 3 sheep (with 5 chickens)." },
  { day: 14, type: "Fractions", diff: 3, q: "There are 24 sweets in a jar. You eat 1/3 of them. How many are LEFT?", hint: "Work out 1/3 of 24 first, then take it away.", answer: "16", why: "1/3 of 24 is 8, and 24 − 8 = 16." },

  // ---- Week 3 ----
  { day: 15, type: "Number Power", diff: 3, q: "What is 8 × 8?", hint: "Eight eights.", answer: "64", why: "8 × 8 = 64." },
  { day: 16, type: "Fractions", diff: 3, q: "What is 1/3 of 27?", hint: "Split 27 into 3 equal groups.", answer: "9", why: "27 ÷ 3 = 9." },
  { day: 17, type: "Brain Teaser", diff: 4, q: "Ben is twice as old as Sam. Together they are 12. How old is each of them?", hint: "Think of Sam as 1 part and Ben as 2 parts — 3 parts make 12.", answer: "Sam is 4, Ben is 8", why: "3 parts = 12, so 1 part = 4. Sam = 4, Ben = 8." },
  { day: 18, type: "Fun", diff: 3, q: "What number comes next? 1, 3, 6, 10, 15, …", hint: "Look at the jumps: +2, +3, +4, +5 …", answer: "21", why: "Each jump grows by one, so the next jump is +6: 15 + 6 = 21. (These are triangular numbers.)" },
  { day: 19, type: "Fractions", diff: 4, q: "What is 3/5 of 35?", hint: "Find 1/5 of 35 first, then take 3 of them.", answer: "21", why: "35 ÷ 5 = 7, and 7 × 3 = 21." },
  { day: 20, type: "Brain Teaser", diff: 4, q: "I have 5 coins that add up to 17p. What could the 5 coins be?", hint: "Try a 10p, then make up 7p with four more coins.", answer: "10p, 2p, 2p, 2p, 1p", why: "10 + 2 + 2 + 2 + 1 = 17p, using 5 coins. (Other answers work too!)" },
  { day: 21, type: "Number Power", diff: 3, q: "What is 56 ÷ 7?", hint: "What times 7 makes 56?", answer: "8", why: "7 × 8 = 56." },

  // ---- Week 4 ----
  { day: 22, type: "Fractions", diff: 4, q: "What is 2/3 of 48?", hint: "Find 1/3 of 48 first, then take 2 of them.", answer: "32", why: "48 ÷ 3 = 16, and 16 × 2 = 32." },
  { day: 23, type: "Brain Teaser", diff: 4, q: "I think of a number, take away 4, then double what's left, and get 10. What was my number?", hint: "Work backwards: halve the 10 first, then undo the −4.", answer: "9", why: "10 ÷ 2 = 5, and 5 + 4 = 9. (Check: 9 − 4 = 5, 5 × 2 = 10.)" },
  { day: 24, type: "Number Power", diff: 4, q: "What is 12 × 12?", hint: "12 × 12 = 12 × 10 + 12 × 2.", answer: "144", why: "120 + 24 = 144." },
  { day: 25, type: "Fractions", diff: 4, q: "What is 3/4 of 48?", hint: "Find a quarter of 48, then take 3 of them.", answer: "36", why: "48 ÷ 4 = 12, and 12 × 3 = 36." },
  { day: 26, type: "Fun", diff: 2, q: "How many days are there in 4 weeks?", hint: "One week is 7 days.", answer: "28", why: "7 × 4 = 28." },
  { day: 27, type: "Brain Teaser", diff: 4, q: "Can you make exactly 3p using only 2p coins? Why or why not?", hint: "What kind of totals do 2p coins always make?", answer: "No", why: "2p coins only ever make even amounts (2, 4, 6…). 3 is odd, so it's impossible." },
  { day: 28, type: "Fractions", diff: 4, q: "A class has 35 children. 2/5 of them walk to school. How many children walk?", hint: "Find 1/5 of 35 first, then take 2 of them.", answer: "14", why: "35 ÷ 5 = 7, and 7 × 2 = 14." },

  // ---- Week 5 ----
  { day: 29, type: "Number Power", diff: 4, q: "What goes in the box?  ▢ × 6 = 48", hint: "What times 6 makes 48?", answer: "8", why: "48 ÷ 6 = 8." },
  { day: 30, type: "Fractions", diff: 3, q: "What is 1/4 of 32?", hint: "Split 32 into 4 equal groups.", answer: "8", why: "32 ÷ 4 = 8." },
  { day: 31, type: "Brain Teaser", diff: 5, q: "Sam has only 20p and 10p coins. He has 5 coins, and they add up to 80p. How many of each coin does he have?", hint: "Try 3 twenties, then see what's left to make with tens.", answer: "Three 20p and two 10p", why: "3 × 20 = 60 and 2 × 10 = 20, total 80p — and that's 5 coins." },
  { day: 32, type: "Fun", diff: 3, q: "How many edges does a cube have?", hint: "Count the edges of a dice — top, bottom and around the middle.", answer: "12", why: "A cube has 12 edges (4 on top, 4 on the bottom, 4 connecting them)." },
  { day: 33, type: "Fractions", diff: 4, q: "What is 5/6 of 36?", hint: "Find 1/6 of 36 first, then take 5 of them.", answer: "30", why: "36 ÷ 6 = 6, and 6 × 5 = 30." },
  { day: 34, type: "Brain Teaser", diff: 4, q: "Three numbers in a row (consecutive) add up to 30. What are the three numbers?", hint: "The middle number is 30 ÷ 3.", answer: "9, 10 and 11", why: "The middle is 30 ÷ 3 = 10, so the numbers are 9, 10, 11." },
  { day: 35, type: "Number Power", diff: 4, q: "What is 96 ÷ 8?", hint: "How many 8s make 96? Try 8 × 10 = 80, then keep going.", answer: "12", why: "8 × 12 = 96." },

  // ---- Week 6 ----
  { day: 36, type: "Fractions", diff: 4, q: "What is 7/10 of 90?", hint: "Find 1/10 of 90 first, then take 7 of them.", answer: "63", why: "90 ÷ 10 = 9, and 9 × 7 = 63." },
  { day: 37, type: "Brain Teaser", diff: 5, q: "I'm a number. I'm odd, I'm a multiple of 3, I'm less than 20, and my two digits add up to 6. What number am I?", hint: "Multiples of 3 under 20: 3, 6, 9, 12, 15, 18. Which is odd AND has digits adding to 6?", answer: "15", why: "15 is odd, a multiple of 3, under 20, and 1 + 5 = 6." },
  { day: 38, type: "Number Power", diff: 4, q: "What is 11 × 12?", hint: "11 × 12 = 12 × 10 + 12 × 1.", answer: "132", why: "120 + 12 = 132." },
  { day: 39, type: "Fractions", diff: 5, q: "What is 7/8 of 40?", hint: "Find 1/8 of 40 first, then take 7 of them.", answer: "35", why: "40 ÷ 8 = 5, and 5 × 7 = 35." },
  { day: 40, type: "Brain Teaser", diff: 4, q: "A book costs £8. A pen costs a quarter of the book's price. How much do a book and a pen cost together?", hint: "Work out a quarter of £8 first.", answer: "£10", why: "A quarter of £8 is £2 (the pen), and £8 + £2 = £10." },
  { day: 41, type: "Fractions", diff: 4, q: "There are 20 cars in a car park. 1/4 of them are red. How many cars are NOT red?", hint: "Work out how many ARE red first.", answer: "15", why: "1/4 of 20 is 5 red cars, so 20 − 5 = 15 are not red." },
  { day: 42, type: "Fun", diff: 3, q: "How many months of the year have 31 days?", hint: "Use the knuckle trick if you know it!", answer: "7", why: "Jan, Mar, May, Jul, Aug, Oct and Dec — that's 7." },

  // ---- Week 7 ----
  { day: 43, type: "Number Power", diff: 4, q: "Work out:  (3 + 4) × 5", hint: "Do the part in the BRACKETS first.", answer: "35", why: "3 + 4 = 7 first (it's in brackets), then 7 × 5 = 35." },
  { day: 44, type: "Brain Teaser", diff: 5, q: "Two numbers multiply together to make 24, and they add up to 11. What are the two numbers?", hint: "Pairs that multiply to 24: 1&24, 2&12, 3&8, 4&6 — which adds to 11?", answer: "3 and 8", why: "3 × 8 = 24 and 3 + 8 = 11." },
  { day: 45, type: "Fractions", diff: 4, q: "What is 3/5 of 45?", hint: "Find 1/5 of 45 first, then take 3 of them.", answer: "27", why: "45 ÷ 5 = 9, and 9 × 3 = 27." },
  { day: 46, type: "Fun", diff: 2, q: "What is half of 130?", hint: "Halve 100, halve 30, then add them.", answer: "65", why: "50 + 15 = 65." },
  { day: 47, type: "Fractions", diff: 5, q: "What is 4/5 of 65?", hint: "Find 1/5 of 65 first, then take 4 of them.", answer: "52", why: "65 ÷ 5 = 13, and 13 × 4 = 52." },
  { day: 48, type: "Brain Teaser", diff: 5, q: "I'm a 2-digit number. My two digits add up to 5, I'm even, and I'm less than 25. What number am I?", hint: "2-digit numbers whose digits add to 5: 14, 23, 32, 41, 50. Which is even AND under 25?", answer: "14", why: "1 + 4 = 5, 14 is even, and it's under 25." },
  { day: 49, type: "Number Power", diff: 3, q: "What is 8 × 7?", hint: "Eight sevens.", answer: "56", why: "8 × 7 = 56." },

  // ---- Week 8 ----
  { day: 50, type: "Fractions", diff: 5, q: "What is 5/6 of 48?", hint: "Find 1/6 of 48 first, then take 5 of them.", answer: "40", why: "48 ÷ 6 = 8, and 8 × 5 = 40." },
  { day: 51, type: "Brain Teaser", diff: 4, q: "Four friends each shake hands once with every other friend. How many handshakes happen altogether?", hint: "The first person shakes 3 hands, the next shakes 2 NEW ones, then 1…", answer: "6", why: "3 + 2 + 1 = 6 handshakes." },
  { day: 52, type: "Number Power", diff: 4, q: "What is 144 ÷ 12?", hint: "What times 12 makes 144?", answer: "12", why: "12 × 12 = 144." },
  { day: 53, type: "Fractions", diff: 4, q: "A coat costs £40. In a sale it has 1/4 off. What is the new price?", hint: "Work out 1/4 of £40, then take it off.", answer: "£30", why: "1/4 of £40 is £10 off, so £40 − £10 = £30." },
  { day: 54, type: "Brain Teaser", diff: 4, q: "A mystery number doubled is 16. What is that same number TRIPLED?", hint: "Find the number first, then multiply by 3.", answer: "24", why: "The number is 8 (8 × 2 = 16), and 8 × 3 = 24." },
  { day: 55, type: "Fun", diff: 3, q: "A rectangle is 6 cm long and 4 cm wide. What is its AREA?", hint: "Area of a rectangle = length × width.", answer: "24 cm²", why: "6 × 4 = 24 square centimetres." },
  { day: 56, type: "Fractions", diff: 4, q: "There are 18 stickers. You give away 2/3 of them. How many do you give away?", hint: "Find 1/3 of 18 first, then take 2 of them.", answer: "12", why: "18 ÷ 3 = 6, and 6 × 2 = 12." },

  // ---- Week 9 ----
  { day: 57, type: "Brain Teaser", diff: 5, q: "3 cats catch 3 mice in 3 minutes. How many cats are needed to catch 6 mice in 6 minutes?", hint: "How many mice can ONE cat catch in 6 minutes?", answer: "3 cats", why: "One cat catches 1 mouse in 3 minutes, so 2 mice in 6 minutes. 3 cats catch 6 mice in 6 minutes." },
  { day: 58, type: "Number Power", diff: 4, q: "Work out:  20 − 3 × 4", hint: "Do the multiplying first.", answer: "8", why: "3 × 4 = 12 first, then 20 − 12 = 8." },
  { day: 59, type: "Fractions", diff: 3, q: "What is 3/4 of 24?", hint: "Find a quarter of 24, then take 3 of them.", answer: "18", why: "24 ÷ 4 = 6, and 6 × 3 = 18." },
  { day: 60, type: "Brain Teaser", diff: 5, q: "I think of a number, add 5, then halve the result, and get 6. What was my number?", hint: "Work backwards: double the 6 first, then undo the +5.", answer: "7", why: "6 × 2 = 12, and 12 − 5 = 7. (Check: 7 + 5 = 12, half of 12 = 6.)" },
  { day: 61, type: "Brain Teaser", diff: 5, q: "A pizza has 12 slices. Three friends share it, but one friend only wants 2 slices. The other two share the rest equally. How many slices do each of the other two get?", hint: "Take off the 2 slices first, then split what's left between 2 people.", answer: "5 slices each", why: "12 − 2 = 10 slices left, shared between 2 friends: 10 ÷ 2 = 5 each." },
  { day: 62, type: "Brain Teaser", diff: 5, q: "Using the numbers 2, 3, 4 and 5 (each once) with + and × signs, can you make 23?", hint: "Try multiplying two pairs, then adding the results.", answer: "3 × 5 + 2 × 4 = 23", why: "3 × 5 = 15 and 2 × 4 = 8, and 15 + 8 = 23." },
  { day: 63, type: "Fun", diff: 1, q: "Final challenge! How many days are there in 9 weeks?", hint: "Days in a week × number of weeks.", answer: "63", why: "7 × 9 = 63 — one challenge for every day. You reached the summit! 🐐🏔️" },
];

const TYPE_META = {
  "Number Power": { color: "#2f7ef0", soft: "#dbeafe", glyph: "×" },
  "Fractions":    { color: "#15a371", soft: "#d2f3e4", glyph: "½" },
  "Brain Teaser": { color: "#f5681e", soft: "#ffe2d1", glyph: "?" },
  "Fun":          { color: "#7c5cf6", soft: "#e7defe", glyph: "★" },
};

const STORAGE_KEY = "goat-goals-maths:v1";   // <- different key from sister's game, so progress never clashes
const TOTAL = QUESTIONS.length;

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function daysBetween(startISO, endISO) {
  const a = new Date(startISO + "T00:00:00");
  const b = new Date(endISO + "T00:00:00");
  return Math.round((b - a) / 86400000);
}
function clamp(n, lo, hi) { return Math.min(Math.max(n, lo), hi); }
function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch (e) {}
  return null;
}

function GoatMaths() {
  const saved = useRef(loadState()).current;
  const [startDate, setStartDate] = useState((saved && saved.startDate) || todayISO());
  const [completed, setCompleted] = useState((saved && saved.completed) || {});
  const currentDay = clamp(daysBetween(startDate, todayISO()) + 1, 1, TOTAL);
  const [selected, setSelected] = useState(() => clamp(daysBetween(((saved && saved.startDate) || todayISO()), todayISO()) + 1, 1, TOTAL));
  const [showHint, setShowHint] = useState(false);
  const [showAnswer, setShowAnswer] = useState(false);
  const [myAnswer, setMyAnswer] = useState("");
  const [feedback, setFeedback] = useState(null); // null | "correct" | "wrong"
  const [showSettings, setShowSettings] = useState(false);
  const [burst, setBurst] = useState(0);

  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ startDate, completed })); } catch (e) {} }, [startDate, completed]);
  useEffect(() => { setShowHint(false); setShowAnswer(false); setMyAnswer(""); setFeedback(null); }, [selected]);

  const q = QUESTIONS.find((x) => x.day === selected);
  const meta = TYPE_META[q.type] || TYPE_META["Fun"];
  const solvedCount = Object.values(completed).filter((c) => c.solved).length;

  let streak = 0;
  for (let d = currentDay; d >= 1; d--) { if (completed[d] && completed[d].solved) streak++; else break; }

  function markSolved() { setCompleted((prev) => ({ ...prev, [selected]: { ...(prev[selected] || {}), solved: true } })); setBurst((b) => b + 1); }
  function unmark() { setCompleted((prev) => { const n = { ...prev }; if (n[selected]) n[selected] = { ...n[selected], solved: false }; return n; }); }
  function peek() { setShowAnswer(true); setCompleted((prev) => ({ ...prev, [selected]: { ...(prev[selected] || {}), peeked: true } })); }

  // Forgiving match: ignore case, spaces, £/$ signs, commas, common units, and a leading "x="
  function norm(s) {
    return String(s).toLowerCase().trim()
      .replace(/[£$,\s]/g, "")
      .replace(/^x=/, "")
      .replace(/(cm2|cm²|m2|m²|cm|mm|km|kg|ml|°c|°|degrees?|pence|p|%)$/, "")
      .replace(/(seconds?|minutes?|hours?|days?|apples?|sweets?|children|cars?)$/, "");
  }
  function check() {
    if (!myAnswer.trim()) return;
    const correct = norm(myAnswer) === norm(q.answer);
    setFeedback(correct ? "correct" : "wrong");
    if (correct && !(completed[selected] && completed[selected].solved)) markSolved();
  }

  const css = `
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Nunito:wght@400;600;700;800&display=swap');
    .ggm * { box-sizing: border-box; }
    .ggm { font-family:'Nunito',sans-serif; color:#15233b; min-height:100vh; padding:22px 16px 50px;
      background: radial-gradient(900px 460px at 88% -6%, #fff0cf 0%, transparent 50%), radial-gradient(1000px 520px at 8% 0%, #d4ecff 0%, transparent 55%), radial-gradient(800px 520px at 50% 116%, #d9f5e6 0%, transparent 55%), #f4f9ff; position:relative; }
    .ggm-wrap { max-width:720px; margin:0 auto; position:relative; }
    .ggm-back { display:inline-block; text-decoration:none; color:#7a8aa3; font-weight:800; font-size:14px; margin-bottom:14px; }
    .ggm-back:hover { color:#2f7ef0; }
    .ggm-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:18px; }
    .ggm-title { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(28px,7vw,44px); line-height:.98; letter-spacing:-1px; margin:0; }
    .ggm-title .hl { color:#f5a623; }
    .ggm-sub { font-weight:700; color:#7a8aa3; font-size:14px; margin-top:4px; }
    .ggm-gear { background:#fff; border:2px solid #e2ebf6; width:42px; height:42px; border-radius:14px; font-size:18px; cursor:pointer; box-shadow:0 3px 0 #e2ebf6; flex:none; }
    .ggm-gear:active { transform:translateY(2px); box-shadow:0 1px 0 #e2ebf6; }
    .ggm-stats { display:flex; gap:10px; margin-bottom:18px; }
    .ggm-stat { flex:1; background:#fff; border:2px solid #e2ebf6; border-radius:16px; padding:10px 14px; box-shadow:0 4px 0 #e2ebf6; }
    .ggm-stat b { font-family:'Bricolage Grotesque',sans-serif; font-size:24px; display:block; line-height:1; }
    .ggm-stat span { font-size:12px; font-weight:800; color:#9aa9bf; text-transform:uppercase; letter-spacing:.6px; }
    .ggm-card { background:#fff; border:2.5px solid #15233b; border-radius:26px; padding:24px 22px; box-shadow:8px 8px 0 ${meta.color}; position:relative; overflow:hidden; }
    .ggm-card .watermark { position:absolute; right:-6px; bottom:-40px; font-size:160px; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; color:${meta.soft}; line-height:1; user-select:none; }
    .ggm-badge { display:inline-flex; align-items:center; gap:7px; background:${meta.soft}; color:${meta.color}; font-weight:800; font-size:13px; padding:6px 12px; border-radius:999px; text-transform:uppercase; letter-spacing:.5px; }
    .ggm-day { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:13px; color:#9aa9bf; letter-spacing:.5px; margin-top:14px; }
    .ggm-q { font-size:clamp(20px,4.6vw,26px); font-weight:800; line-height:1.35; margin:6px 0 0; position:relative; }
    .ggm-diff { margin-top:12px; font-size:12px; font-weight:800; color:#aab7cb; }
    .ggm-diff .dot { color:${meta.color}; }
    .ggm-actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:22px; position:relative; }
    .ggm-btn { font-family:'Nunito',sans-serif; font-weight:800; font-size:15px; border:2.5px solid #15233b; background:#fff; padding:11px 18px; border-radius:14px; cursor:pointer; box-shadow:0 4px 0 #15233b; transition:transform .05s; }
    .ggm-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #15233b; }
    .ggm-btn.solve { background:${meta.color}; color:#fff; }
    .ggm-btn.solved { background:#15a371; color:#fff; }
    .ggm-btn.ghost { box-shadow:0 4px 0 #e2ebf6; border-color:#e2ebf6; color:#5b6b82; }
    .ggm-reveal { margin-top:16px; background:${meta.soft}; border-radius:16px; padding:14px 16px; font-weight:600; line-height:1.5; animation:pop .25s ease; }
    .ggm-reveal .lab { font-weight:800; color:${meta.color}; text-transform:uppercase; font-size:12px; letter-spacing:.6px; display:block; margin-bottom:3px; }
    .ggm-reveal .ans { font-family:'Bricolage Grotesque',sans-serif; font-size:22px; font-weight:800; }
    .ggm-answerbox { display:flex; gap:10px; margin-top:22px; flex-wrap:wrap; }
    .ggm-input { flex:1; min-width:160px; font-family:'Nunito',sans-serif; font-weight:700; font-size:16px; padding:11px 15px; border:2.5px solid #e2ebf6; border-radius:14px; outline:none; color:#15233b; background:#fff; }
    .ggm-input:focus { border-color:${meta.color}; }
    .ggm-youwrote { font-weight:700; margin-bottom:6px; }
    .ggm-youwrote b { color:${meta.color}; }
    .ggm-fb { margin-top:16px; border-radius:16px; padding:14px 16px; font-weight:700; line-height:1.5; animation:pop .25s ease; }
    .ggm-fb.correct { background:#d9f5e6; border:2.5px solid #15a371; color:#0f6b4a; }
    .ggm-fb.wrong { background:#fff2d6; border:2.5px solid #e0a417; color:#8a5a00; }
    .ggm-fb .big { font-family:'Bricolage Grotesque',sans-serif; font-size:19px; display:block; margin-bottom:3px; }
    @keyframes pop { from {opacity:0; transform:translateY(6px) scale(.98);} to {opacity:1; transform:none;} }
    .ggm-nav { display:flex; align-items:center; justify-content:space-between; margin-top:18px; gap:10px; }
    .ggm-navbtn { border:2px solid #e2ebf6; background:#fff; border-radius:12px; padding:8px 14px; font-weight:800; cursor:pointer; box-shadow:0 3px 0 #e2ebf6; }
    .ggm-navbtn:disabled { opacity:.35; cursor:default; box-shadow:none; }
    .ggm-today { background:#15233b; color:#fff; border:2px solid #15233b; box-shadow:0 3px 0 #000; }
    .ggm-section { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:16px; margin:26px 0 10px; color:#5b6b82; }
    .ggm-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:7px; }
    .ggm-cell { aspect-ratio:1; border-radius:11px; border:2px solid #e2ebf6; background:#fff; font-weight:800; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#aab7cb; position:relative; }
    .ggm-cell.done { background:#15a371; color:#fff; border-color:#15a371; }
    .ggm-cell.peeked { background:#eef3fb; color:#9aa9bf; border-color:#dde6f2; }
    .ggm-cell.today { border-color:#15233b; border-width:2.5px; color:#15233b; box-shadow:0 0 0 3px #ffe0a3; }
    .ggm-cell.sel { transform:scale(1.08); box-shadow:0 0 0 2px ${meta.color}; }
    .ggm-weeklab { font-size:11px; font-weight:800; color:#b6c2d6; grid-column:1 / -1; margin-top:6px; text-transform:uppercase; letter-spacing:.5px; }
    .ggm-modal { position:fixed; inset:0; background:rgba(21,35,59,.5); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }
    .ggm-modal-card { background:#f4f9ff; border:2.5px solid #15233b; border-radius:22px; padding:24px; max-width:380px; width:100%; box-shadow:8px 8px 0 #f5a623; }
    .ggm-modal-card h3 { font-family:'Bricolage Grotesque',sans-serif; margin:0 0 6px; font-size:22px; }
    .ggm-modal-card p { font-size:14px; color:#5b6b82; font-weight:600; margin:0 0 16px; line-height:1.5; }
    .ggm-modal-card input { font-family:'Nunito',sans-serif; font-size:16px; font-weight:700; padding:10px 12px; border:2px solid #15233b; border-radius:12px; width:100%; margin-bottom:16px; }
    .ggm-confetti { position:absolute; left:50%; top:30%; pointer-events:none; }
    .ggm-confetti i { position:absolute; width:9px; height:9px; border-radius:2px; animation:fly .9s ease-out forwards; }
    @keyframes fly { to { transform:translate(var(--x), var(--y)) rotate(var(--r)); opacity:0; } }
  `;
  const confettiColors = ["#2f7ef0", "#15a371", "#f5681e", "#7c5cf6", "#f5a623"];

  return (
    <div className="ggm">
      <style>{css}</style>
      <div className="ggm-wrap">
        <a className="ggm-back" href="index.html">← GOAT Goals</a>
        <div className="ggm-head">
          <div>
            <h1 className="ggm-title">GOAT <span className="hl">Maths</span> 🐐</h1>
            <div className="ggm-sub">Climb to greatness · one challenge a day · 63 days</div>
          </div>
          <button className="ggm-gear" onClick={() => setShowSettings(true)} title="Settings">⚙</button>
        </div>

        <div className="ggm-stats">
          <div className="ggm-stat"><b>{solvedCount}<span style={{ fontSize: 13, color: "#b6c2d6" }}> / {TOTAL}</span></b><span>Conquered</span></div>
          <div className="ggm-stat"><b>{streak} 🔥</b><span>Day streak</span></div>
          <div className="ggm-stat"><b>{currentDay}</b><span>Today is day</span></div>
        </div>

        <div className="ggm-card">
          <div className="watermark">{meta.glyph}</div>
          <span className="ggm-badge">{meta.glyph} {q.type}</span>
          <div className="ggm-day">DAY {q.day}{q.day === currentDay ? " · today" : q.day < currentDay ? " · catch-up" : " · coming up"}</div>
          <p className="ggm-q">{q.q}</p>
          <div className="ggm-diff">Challenge level: <span className="dot">{"▲".repeat(q.diff)}</span><span style={{ color: "#e3eaf4" }}>{"▲".repeat(5 - q.diff)}</span></div>

          <div className="ggm-answerbox">
            <input
              className="ggm-input"
              type="text"
              placeholder="Work it out, then type your answer…"
              value={myAnswer}
              onChange={(e) => { setMyAnswer(e.target.value); if (feedback) setFeedback(null); }}
              onKeyDown={(e) => { if (e.key === "Enter") check(); }}
            />
            <button className="ggm-btn solve" onClick={check}>✓ Check</button>
          </div>

          {feedback === "correct" && (
            <div className="ggm-fb correct">
              <span className="big">✓ Spot on — you nailed it! 💪</span>
              {q.why && <div style={{ fontWeight: 600 }}>{q.why}</div>}
            </div>
          )}
          {feedback === "wrong" && (
            <div className="ggm-fb wrong">
              <span className="big">Not quite — have another go! 🤔</span>
              <div style={{ fontWeight: 600 }}>Check your working and try again. Stuck? Tap the hint, or “Just show me”.</div>
            </div>
          )}

          <div className="ggm-actions">
            {burst > 0 && (
              <div className="ggm-confetti" key={burst}>
                {Array.from({ length: 14 }).map((_, i) => {
                  const ang = (i / 14) * Math.PI * 2;
                  return <i key={i} style={{ background: confettiColors[i % confettiColors.length], "--x": `${Math.cos(ang) * 90}px`, "--y": `${Math.sin(ang) * 90 - 20}px`, "--r": `${Math.random() * 360}deg` }} />;
                })}
              </div>
            )}
            {q.hint && <button className="ggm-btn ghost" onClick={() => setShowHint((s) => !s)}>{showHint ? "Hide hint" : "💡 Hint"}</button>}
            <button className="ggm-btn ghost" onClick={peek}>👀 Just show me</button>
            {completed[selected] && completed[selected].solved
              ? <button className="ggm-btn solved" onClick={unmark}>✓ Conquered!</button>
              : <button className="ggm-btn solve" onClick={markSolved}>I nailed it 💪</button>}
          </div>

          {showHint && q.hint && (<div className="ggm-reveal"><span className="lab">Hint</span>{q.hint}</div>)}
          {showAnswer && (
            <div className="ggm-reveal">
              <span className="lab">Answer</span>
              {myAnswer.trim() && <div className="ggm-youwrote">You wrote: <b>{myAnswer}</b></div>}
              <div className="ans">{q.answer}</div>
              {q.why && <div style={{ marginTop: 8, fontWeight: 600 }}>{q.why}</div>}
            </div>
          )}
        </div>

        <div className="ggm-nav">
          <button className="ggm-navbtn" disabled={selected <= 1} onClick={() => setSelected((s) => Math.max(1, s - 1))}>← Prev</button>
          <button className="ggm-navbtn ggm-today" onClick={() => setSelected(currentDay)}>Jump to today</button>
          <button className="ggm-navbtn" disabled={selected >= TOTAL} onClick={() => setSelected((s) => Math.min(TOTAL, s + 1))}>Next →</button>
        </div>

        <div className="ggm-section">Your 63-day climb 🏔️</div>
        <div className="ggm-grid">
          {QUESTIONS.map((item, idx) => {
            const c = completed[item.day] || {};
            const cls = ["ggm-cell", c.solved ? "done" : (c.peeked ? "peeked" : ""), item.day === currentDay ? "today" : "", item.day === selected ? "sel" : ""].join(" ");
            const newWeek = idx % 7 === 0;
            return (
              <React.Fragment key={item.day}>
                {newWeek && <div className="ggm-weeklab">Week {idx / 7 + 1}</div>}
                <button className={cls} onClick={() => setSelected(item.day)} title={`Day ${item.day} · ${item.type}`}>{c.solved ? "✓" : item.day}</button>
              </React.Fragment>
            );
          })}
        </div>
      </div>

      {showSettings && (
        <div className="ggm-modal" onClick={() => setShowSettings(false)}>
          <div className="ggm-modal-card" onClick={(e) => e.stopPropagation()}>
            <h3>When does summer start? 🐐</h3>
            <p>Pick the first day of the holidays. The climb lines “today’s challenge” up with the calendar from there.</p>
            <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} />
            <button className="ggm-btn solve" style={{ width: "100%" }} onClick={() => setShowSettings(false)}>Save</button>
            <button className="ggm-btn ghost" style={{ width: "100%", marginTop: 10 }}
              onClick={() => { if (window.confirm("Reset all progress?")) { setCompleted({}); setShowSettings(false); } }}>Reset progress</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GoatMaths />);
</script>
</body>
</html>
