<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>History Detective · The World Wars</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔎</text></svg>" />

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
  html, body { margin: 0; height: 100%; background: #e7dcc2; }
  #root { min-height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ============================================================================
   HISTORY DETECTIVE — The World Wars (for ~age 9, honest but gentle)
   You play the INVESTIGATOR. The propaganda chapter teaches you to SPOT and
   RESIST manipulation — never to use it. Edit chapters/questions below.
   ========================================================================== */

const CHAPTERS = [
  {
    id:"ww1", title:"The Great War", emoji:"🎖️",
    intro:"Case 1: How did the world end up in the biggest war it had ever seen — with armies of millions?",
    questions:[
      { q:"Roughly how many soldiers fought in the First World War, across the whole world?",
        options:["About one thousand","About one million","More than sixty million","Just a few hundred"], correct:2,
        why:"Over 60 million soldiers were called up across the world — by far the biggest armies humanity had ever raised." },
      { q:"Here's the big mystery: how did countries get such ENORMOUS armies so fast?",
        options:["They used conscription — laws forcing men to join","They hired robots","Only kings fought","Everyone just fancied it"], correct:0,
        why:"Most countries used conscription — laws that made millions of ordinary men join up whether they wanted to or not. Britain started with volunteers, then brought in conscription in 1916." },
      { q:"At the very start in 1914, huge numbers VOLUNTEERED eagerly. Why were so many keen to sign up?",
        options:["They were each paid a fortune","They thought it'd be a short, glorious adventure — 'over by Christmas'","They disliked their homes","There was nothing else to do, ever"], correct:1,
        why:"Excitement and propaganda convinced many it would be quick and glorious — 'over by Christmas'. It wasn't: it lasted over four years and was horrific." },
      { q:"Countries like Britain and France could raise especially massive armies because they had…",
        options:["Magic","Huge empires, drawing soldiers from all over the world","More holidays","Secret giants"], correct:1,
        why:"Britain and France had vast empires, so soldiers came from India, Africa, Canada, Australia, the Caribbean and beyond — millions from across the globe." },
      { q:"Much of the war was fought from long ditches dug into the ground. What were these called?",
        options:["Tunnels","Trenches","Castles","Caves"], correct:1,
        why:"Soldiers dug trenches for shelter. Between the enemy trenches lay a deadly 'No Man's Land', and the fighting often got stuck for years with barely any ground won." },
      { q:"Which terrifying new machines and weapons first appeared in WW1?",
        options:["Lasers and moon rockets","Only swords and bows","Tanks, aeroplanes and poison gas","Nothing new at all"], correct:2,
        why:"WW1 brought the first widespread tanks, fighter planes, machine guns and poison gas — making it deadlier than any war before it." },
      { q:"How did the war end for Germany — and why did that matter for the future?",
        options:["Germany won easily","Germany lost and had to sign the harsh Treaty of Versailles","Nothing changed","Everyone instantly became friends"], correct:1,
        why:"Germany lost in 1918 and was forced to sign the Treaty of Versailles — taking the blame, losing land and paying huge fines. Many Germans felt humiliated and furious. Remember that feeling — it comes back in Case 2." },
    ]
  },
  {
    id:"power", title:"How Hitler Took Power", emoji:"⚠️",
    intro:"Case 2: How did one of history's most dangerous men come to rule a modern country — and how was its democracy lost?",
    questions:[
      { q:"After WW1, Germany's money collapsed. In 1923 things got so bad that…",
        options:["Money grew on trees","People needed wheelbarrows of cash just to buy bread","Everyone became rich","They stopped using money forever"], correct:1,
        why:"This is called hyperinflation — prices rose so fast that banknotes became nearly worthless. Some people even burned cash because it was cheaper than firewood." },
      { q:"In 1929, a disaster on the other side of the world made everything worse. What was it?",
        options:["The Great Depression — a worldwide money crash","A giant storm","An alien invasion","A football match"], correct:0,
        why:"The Great Depression threw millions of Germans out of work. Frightened, desperate people began looking for anyone who promised to fix it all." },
      { q:"When people feel desperate and afraid, dangerous leaders often rise. What did Hitler PROMISE Germans?",
        options:["Nothing at all","Jobs, pride, and to make Germany powerful again","Endless school","To give all the land away"], correct:1,
        why:"He promised jobs, national pride and to tear up the hated Treaty of Versailles. To desperate people, big promises were tempting — even from a dangerous man." },
      { q:"Here's the part that surprises people. How did Hitler FIRST become leader in 1933?",
        options:["He won a war","He bought the country","He was legally appointed Chancellor","He was crowned king"], correct:2,
        why:"He came to power legally — appointed Chancellor in 1933 after the Nazis won many votes. The scary lesson: a democracy can be lost from the inside, not only by invasion." },
      { q:"Once in charge, what did Hitler do to Germany's democracy?",
        options:["Made it stronger","Held more elections","Destroyed it — banning other parties and the free press, ruling as a dictator","Shared power fairly"], correct:2,
        why:"He banned other parties, controlled the newspapers, jailed opponents and made himself dictator. The very freedoms that could have stopped him were taken away." },
      { q:"The Nazis cruelly blamed one group of people for Germany's problems. Who — and was it true?",
        options:["Jewish people — and it was a complete and cruel lie","The weather","Teachers","Footballers"], correct:0,
        why:"The Nazis unfairly blamed Jewish people for Germany's troubles. This was a total lie. They stripped away Jewish people's rights, and later murdered six million Jewish people — and millions of others — in a terrible crime called the Holocaust. We learn this honestly so that we can make sure it never happens again." },
      { q:"What is the BIG lesson from how Hitler came to power?",
        options:["Strong leaders are always good","History doesn't matter","Watch for the warning signs and protect democracy — a free press, fair courts, the vote","Nothing useful"], correct:2,
        why:"When people are scared, leaders who blame others and promise easy answers can be dangerous. A free press, fair courts and the right to vote are what protect us — and spotting the warning signs is how we stop it happening again." },
    ]
  },
  {
    id:"propaganda", title:"Spot the Trick", emoji:"🕵️",
    intro:"Case 3: How were so many ordinary people fooled? Learn the manipulation tricks — so they can NEVER fool you.",
    questions:[
      { q:"The Nazis kept repeating that one group was to blame for ALL of Germany's problems. What trick is this?",
        options:["Being honest","Scapegoating — blaming one group unfairly","Telling jokes","Asking questions"], correct:1,
        why:"Scapegoating means blaming a person or group for problems that aren't their fault. How to spot it: if someone says 'ALL our problems are because of THEM', be very suspicious." },
      { q:"They controlled the newspapers, radio and films, so people only ever heard the Nazi side. Why is that so dangerous?",
        options:["It's actually helpful","It makes the news shorter","People can't hear the truth or any other point of view","Nothing wrong with it"], correct:2,
        why:"If one group controls all the news, people never hear the truth or other opinions. How to spot it: a free press that's allowed to disagree with leaders is the sign of a healthy country." },
      { q:"They held giant rallies with flags, uniforms, torches and music. Why all the spectacle?",
        options:["To make people feel excited and part of something, so they stop thinking for themselves","Just for fun","To save money","No reason"], correct:0,
        why:"Spectacle makes people feel powerful and part of a crowd — and stop asking questions. How to spot it: be careful when a feeling of 'belonging' is used to switch off your own thinking." },
      { q:"They repeated big, simple lies over and over until people believed them. Why does that work?",
        options:["Repeating a lie makes it true","It's polite","People start to believe things they hear again and again","It doesn't work"], correct:2,
        why:"A lie repeated often enough can start to FEEL true — but repetition never makes it real. How to spot it: check the facts, not how many times you've heard it." },
      { q:"They split everyone into 'US' (good, true Germans) and 'THEM' (an enemy to fear). What's this trick called?",
        options:["Teamwork","Sharing","Us-versus-them — dividing people to control them","Maths"], correct:2,
        why:"Turning people against each other makes a crowd easier to lead. How to spot it: when someone divides the world into 'us good, them evil', ask whether it's really that simple." },
      { q:"Most important question of the whole case: why do we learn these tricks?",
        options:["So we can use them on others","For fun only","So we can recognise them and never be fooled by them","We shouldn't learn them"], correct:2,
        why:"Knowing the tricks is like a superpower: you can spot manipulation in adverts, online, or from anyone trying to fool a crowd — and think for yourself. That's how good people stop bad ideas from spreading." },
    ]
  },
  {
    id:"france", title:"Why the Wall Fell", emoji:"🗺️",
    intro:"Case 4: France built a mighty wall to stop Germany forever. So how did France fall in just six weeks?",
    questions:[
      { q:"After WW1, France built a huge line of forts to block any German invasion. What was it called?",
        options:["The Maginot Line","The Great Wall","Hadrian's Wall","The Berlin Wall"], correct:0,
        why:"The Maginot Line was a chain of powerful forts along France's border with Germany. France felt completely safe behind it." },
      { q:"Where did France and Britain EXPECT the German attack to come?",
        options:["From space","Through flat, open Belgium in the north","From the sea only","They expected nothing"], correct:1,
        why:"Just like in WW1, the Allies expected Germany to sweep through Belgium — so they marched their best armies north to meet them there." },
      { q:"Germany did something everyone thought was impossible. Where did their tanks actually attack through?",
        options:["Straight at the Maginot Line","The thick Ardennes forest, thought too difficult for tanks","The sea","The sky"], correct:1,
        why:"The Germans pushed their tanks through the hilly, wooded Ardennes — which everyone believed tanks couldn't cross. They burst out where nobody was guarding, right behind the Allied armies." },
      { q:"The German tactic of fast tanks and planes striking together was nicknamed…",
        options:["Blitzkrieg — 'lightning war'","The slow march","A picnic","Trench warfare"], correct:0,
        why:"Blitzkrieg means 'lightning war': fast tanks, planes and troops hitting quickly and deep before the enemy could react — the opposite of WW1's slow trenches." },
      { q:"So why did France's mighty Maginot Line fail?",
        options:["It fell down","It was never finished","The Germans simply went AROUND it through the Ardennes","The Germans climbed over it"], correct:2,
        why:"The wall was never beaten — the Germans just went around it. Big lesson: even a strong, fixed defence is useless if you can be surprised and out-manoeuvred." },
      { q:"With the armies trapped, hundreds of thousands of British and French soldiers were rescued from one French beach. What was this called?",
        options:["The Dunkirk evacuation","The Dover swim","The Paris parade","No one was rescued"], correct:0,
        why:"At Dunkirk, around 338,000 soldiers were rescued across the Channel — many in small civilian boats. France fell in 1940, but those rescued soldiers lived to fight on." },
      { q:"What's the big THINKING lesson from the fall of France?",
        options:["Walls always work","Tanks can't move","Don't just trust one strong defence — stay alert and ready to adapt","Forests are scary"], correct:2,
        why:"France prepared perfectly for the LAST war and got surprised by a new kind of attack. The lesson: never assume the future will look like the past — stay alert and ready to adapt." },
    ]
  },
  {
    id:"victory", title:"How the War Was Won", emoji:"🕊️",
    intro:"Case 5: After France fell, Britain stood almost alone. So how did the Allies fight back — and finally win?",
    questions:[
      { q:"After France fell in 1940, Germany first tried to defeat Britain from the air. What was this huge air battle called?",
        options:["The Battle of Hastings","The Battle of Britain","The Battle of the Somme","The Battle of Trafalgar"], correct:1,
        why:"In the summer of 1940, Britain's Royal Air Force (the RAF) fought off Germany's air force in the skies. Winning the Battle of Britain stopped Germany from invading — a huge turning point." },
      { q:"The outnumbered RAF had a clever secret helper — a brand-new invention that spotted enemy planes from far away. What was it?",
        options:["Radar","Television","Binoculars","The telephone"], correct:0,
        why:"Radar used radio waves to detect aircraft long before they arrived, so the RAF knew exactly where to send its few planes. Smart science helped save Britain." },
      { q:"The war spread across the whole globe. A surprise attack in 1941 brought the mighty USA into the war. What was attacked?",
        options:["London","Paris","The American naval base at Pearl Harbor","Berlin"], correct:2,
        why:"In December 1941, Japan attacked the US base at Pearl Harbor, and the United States joined the war — adding its enormous factories and forces to the Allies." },
      { q:"Hitler made a giant mistake in 1941 by invading which huge country, where the freezing winters and fierce resistance slowly wore his army down?",
        options:["Switzerland","The Soviet Union (Russia)","Ireland","Spain"], correct:1,
        why:"Germany invaded the Soviet Union, but the vast distances and brutal winters — especially the terrible battle at Stalingrad — cost Germany dearly, and became a major turning point." },
      { q:"On 6 June 1944, the Allies launched the biggest sea invasion in history to free occupied Europe. Which French beaches did they land on?",
        options:["The beaches of Normandy","The beaches of Italy","The beaches of Spain","The beaches of Greece"], correct:0,
        why:"On D-Day, thousands of ships landed Allied soldiers on the beaches of Normandy in France — the beginning of freeing Western Europe from Nazi control." },
      { q:"As Allied soldiers pushed into Europe, they freed prisoners from the Nazi camps. What is the most important thing to do about this?",
        options:["Forget it quickly","Pretend it wasn't important","Remember the Holocaust, so such cruelty never happens again","Nothing"], correct:2,
        why:"As the Allies advanced, they freed survivors from the camps, and the world saw the full horror of the Holocaust. We remember it — and the people who suffered — so that such cruelty is never allowed to happen again." },
      { q:"How did the war in Europe finally end in 1945 — and what helped the Allies win?",
        options:["Germany surrendered; the Allies won by working together","Britain gave up","It simply faded away","A single hero won it alone"], correct:0,
        why:"In May 1945 Germany surrendered, celebrated as Victory in Europe ('VE') Day. No country beat the Nazis alone — Britain, the USA, the Soviet Union and many others combined their people, factories and courage. The war cost millions of lives, which is exactly why understanding how it began — and how ordinary people resisted — matters so much." },
    ]
  },
];

const STORAGE_KEY = "history-detective:v1";
function loadState(){ try{ const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); }catch(e){} return null; }
const TOTAL = CHAPTERS.reduce((n,c)=>n+c.questions.length,0);

function HistoryDetective(){
  const saved = useRef(loadState()).current;
  const [answers, setAnswers] = useState((saved && saved.answers) || {}); // { "chId:idx": chosenIndex }
  const [ch, setCh] = useState(0);
  const [qi, setQi] = useState(0);

  useEffect(()=>{ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({ answers })); }catch(e){} }, [answers]);

  const chapter = CHAPTERS[ch];
  const q = chapter.questions[qi];
  const key = chapter.id + ":" + qi;
  const chosen = answers[key];
  const answered = chosen !== undefined && chosen !== null;

  const clues = Object.entries(answers).reduce((n,[k,v])=>{
    const [cid, i] = k.split(":");
    const c = CHAPTERS.find(x=>x.id===cid);
    if(c && c.questions[+i] && c.questions[+i].correct === v) return n+1;
    return n;
  },0);

  let rank = "Recruit";
  if (clues >= TOTAL) rank = "🏅 Chief Historian";
  else if (clues >= 20) rank = "🎖️ Inspector";
  else if (clues >= 12) rank = "🕵️ Detective";
  else if (clues >= 5) rank = "🔍 Junior Detective";
  else if (clues >= 1) rank = "🔎 Recruit on the case";

  function answer(i){ if(answered) return; setAnswers(p=>({ ...p, [key]: i })); }

  // chapter completion
  const chDone = chapter.questions.every((_,i)=> answers[chapter.id+":"+i] !== undefined);
  const chCorrect = chapter.questions.reduce((n,qq,i)=> n + (answers[chapter.id+":"+i] === qq.correct ? 1 : 0), 0);

  const css = `
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Nunito:wght@400;600;700;800&display=swap');
    .hd * { box-sizing:border-box; }
    .hd { font-family:'Nunito',sans-serif; color:#2b2520; min-height:100vh; padding:22px 16px 50px;
      background:
        radial-gradient(900px 480px at 50% -10%, #f3ead3 0%, transparent 60%),
        repeating-linear-gradient(0deg, rgba(120,90,40,.025) 0 1px, transparent 1px 26px),
        #e7dcc2; }
    .hd-wrap { max-width:680px; margin:0 auto; }
    .hd-head { text-align:center; }
    .hd-kicker { font-family:'Special Elite',monospace; letter-spacing:.25em; text-transform:uppercase; font-size:11px; color:#b23b2e; }
    .hd-title { font-family:'Special Elite',monospace; font-size:clamp(30px,7vw,46px); margin:.12em 0 .04em; color:#2b2520; letter-spacing:.02em; }
    .hd-sub { font-weight:700; color:#7c6a4c; font-size:14px; max-width:34ch; margin:2px auto 0; line-height:1.45; }

    .hd-stats { display:flex; gap:10px; margin:18px 0 14px; }
    .hd-stat { flex:1; background:#fdfaf1; border:2px solid #cdbf9c; border-radius:12px; padding:9px 12px; text-align:center; box-shadow:0 3px 0 #cdbf9c; }
    .hd-stat b { font-family:'Special Elite',monospace; font-size:20px; display:block; line-height:1.1; color:#b23b2e; }
    .hd-stat span { font-size:11px; font-weight:800; color:#9a8763; text-transform:uppercase; letter-spacing:.5px; }
    .hd-rank { text-align:center; font-family:'Special Elite',monospace; color:#2b2520; margin:-2px 0 16px; font-size:15px; }

    .hd-tabs { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-bottom:16px; }
    .hd-tab { font-family:'Nunito',sans-serif; font-weight:800; font-size:13px; border:2px solid #cdbf9c; background:#fdfaf1; color:#7c6a4c; padding:8px 12px; border-radius:10px; cursor:pointer; box-shadow:0 2px 0 #cdbf9c; }
    .hd-tab.active { background:#2b2520; color:#f3ead3; border-color:#2b2520; box-shadow:0 2px 0 #000; }
    .hd-tab .tick { color:#3f7d4f; }

    .hd-intro { background:#f7efda; border-left:4px solid #b23b2e; border-radius:0 12px 12px 0; padding:11px 14px; font-weight:700; font-style:italic; color:#6f5d40; font-size:14px; margin-bottom:14px; line-height:1.45; }

    .hd-card { background:#fffdf6; border:2.5px solid #2b2520; border-radius:16px; padding:20px 20px 18px; box-shadow:7px 7px 0 #b23b2e; position:relative; }
    .hd-file { font-family:'Special Elite',monospace; font-size:11px; color:#b8a880; letter-spacing:.1em; }
    .hd-q { font-family:'Special Elite',monospace; font-size:clamp(17px,3.8vw,21px); line-height:1.45; margin:8px 0 0; color:#2b2520; }
    .hd-opts { display:flex; flex-direction:column; gap:9px; margin-top:16px; }
    .hd-opt { font-family:'Nunito',sans-serif; text-align:left; font-weight:700; font-size:15px; border:2px solid #d8caa6; background:#fdfaf1; color:#2b2520; padding:12px 14px; border-radius:11px; cursor:pointer; transition:transform .05s; }
    .hd-opt:hover:not(:disabled){ border-color:#b23b2e; }
    .hd-opt:disabled{ cursor:default; }
    .hd-opt.correct{ background:#dcedd9; border-color:#3f7d4f; color:#2c5a37; }
    .hd-opt.wrong{ background:#f6dcd6; border-color:#b23b2e; color:#8f2c20; }

    .hd-verdict { margin-top:15px; background:#f7efda; border-radius:12px; padding:13px 15px; animation:pop .25s ease; }
    .hd-verdict .stamp { font-family:'Special Elite',monospace; font-weight:700; font-size:14px; letter-spacing:.05em; }
    .hd-verdict.good .stamp{ color:#3f7d4f; }
    .hd-verdict.bad .stamp{ color:#b23b2e; }
    .hd-verdict p { margin:6px 0 0; font-weight:600; line-height:1.5; font-size:15px; color:#5b4d36; }
    @keyframes pop { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

    .hd-nav { display:flex; align-items:center; justify-content:space-between; margin-top:18px; gap:10px; }
    .hd-navbtn { font-family:'Nunito',sans-serif; border:2px solid #cdbf9c; background:#fdfaf1; border-radius:11px; padding:9px 15px; font-weight:800; cursor:pointer; color:#2b2520; box-shadow:0 3px 0 #cdbf9c; }
    .hd-navbtn:disabled { opacity:.35; box-shadow:none; cursor:default; }
    .hd-navbtn.next { background:#b23b2e; color:#fff; border-color:#8f2c20; box-shadow:0 3px 0 #8f2c20; }
    .hd-dots { display:flex; gap:6px; justify-content:center; margin-top:14px; }
    .hd-dot { width:9px; height:9px; border-radius:50%; background:#d2c4a1; cursor:pointer; }
    .hd-dot.right { background:#3f7d4f; }
    .hd-dot.wrong { background:#b23b2e; }
    .hd-dot.cur { box-shadow:0 0 0 2px #2b2520; }

    .hd-solved { text-align:center; font-family:'Special Elite',monospace; color:#3f7d4f; margin-top:16px; font-size:15px; }
  `;

  return (
    <div className="hd">
      <style>{css}</style>
      <div className="hd-wrap">
        <div className="hd-head">
          <div className="hd-kicker">Case files · the World Wars</div>
          <div className="hd-title">History Detective 🔎</div>
          <div className="hd-sub">Crack each case by finding the clues. You're the investigator — work out how it all happened.</div>
        </div>

        <div className="hd-stats">
          <div className="hd-stat"><b>{clues}<span style={{ fontSize: 12, color: "#b8a880" }}> / {TOTAL}</span></b><span>Clues found</span></div>
          <div className="hd-stat"><b style={{ fontSize: 15 }}>{rank}</b><span>Your rank</span></div>
        </div>

        <div className="hd-tabs">
          {CHAPTERS.map((c, i) => {
            const done = c.questions.every((_, j) => answers[c.id + ":" + j] !== undefined);
            return (
              <button key={c.id} className={"hd-tab" + (i === ch ? " active" : "")} onClick={() => { setCh(i); setQi(0); }}>
                {c.emoji} {c.title} {done && <span className="tick">✓</span>}
              </button>
            );
          })}
        </div>

        <div className="hd-intro">{chapter.intro}</div>

        <div className="hd-card">
          <div className="hd-file">CASE {ch + 1} · CLUE {qi + 1} OF {chapter.questions.length}</div>
          <p className="hd-q">{q.q}</p>

          <div className="hd-opts">
            {q.options.map((o, i) => {
              let cls = "hd-opt";
              if (answered && i === q.correct) cls += " correct";
              else if (answered && i === chosen) cls += " wrong";
              return <button key={i} className={cls} disabled={answered} onClick={() => answer(i)}>{o}</button>;
            })}
          </div>

          {answered && (
            <div className={"hd-verdict " + (chosen === q.correct ? "good" : "bad")}>
              <div className="stamp">{chosen === q.correct ? "✓ CLUE FOUND" : "✗ NOT QUITE — HERE'S THE TRUTH"}</div>
              <p>{q.why}</p>
            </div>
          )}

          <div className="hd-nav">
            <button className="hd-navbtn" disabled={qi <= 0} onClick={() => setQi(i => Math.max(0, i - 1))}>← Back</button>
            {qi < chapter.questions.length - 1
              ? <button className="hd-navbtn next" onClick={() => setQi(i => i + 1)}>Next clue →</button>
              : (ch < CHAPTERS.length - 1
                  ? <button className="hd-navbtn next" onClick={() => { setCh(ch + 1); setQi(0); }}>Next case →</button>
                  : <button className="hd-navbtn next" disabled>Final clue</button>)}
          </div>

          <div className="hd-dots">
            {chapter.questions.map((qq, i) => {
              const a = answers[chapter.id + ":" + i];
              let cls = "hd-dot";
              if (a !== undefined) cls += (a === qq.correct ? " right" : " wrong");
              if (i === qi) cls += " cur";
              return <div key={i} className={cls} onClick={() => setQi(i)} />;
            })}
          </div>

          {chDone && <div className="hd-solved">Case {ch + 1} solved! {chCorrect} / {chapter.questions.length} clues found 🔎</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<HistoryDetective />);
</script>
</body>
</html>
